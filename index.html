<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNA Combat Manager</title>
<style>
:root {
  --bg: #121318; --surface: #1a1c24; --card: #22252e;
  --border: #2e3140; --text: #e0e0e8; --muted: #7a7f94;
  --hit: #4ecca3; --miss: #e05570; --crit: #f5c842;
  --accent: #5b8cf7; --green: #4ecca3; --red: #e05570;
  /* Tier colors */
  --tier-s: #f5c842; --tier-a: #5baaff; --tier-b: #8bc34a; --tier-c: #888;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'SF Mono', 'Consolas', 'Fira Code', monospace; background: var(--bg); color: var(--text); padding: 8px; font-size: 13px; line-height: 1.4; }

.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; margin-bottom: 6px; }
button { font-family: inherit; background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
button:hover { background: #333648; }
button.act { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: bold; }
button.go { background: var(--green); border-color: var(--green); color: #111; font-weight: bold; font-size: 14px; padding: 6px 20px; }
button.sm { padding: 2px 8px; font-size: 11px; }
select, input[type=number], input[type=text] { font-family: inherit; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 3px 6px; border-radius: 3px; font-size: 12px; }
select { min-width: 100px; }
input[type=number] { width: 50px; }
label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 1px; }
.row { display: flex; gap: 8px; align-items: end; flex-wrap: wrap; }
.row > div { display: flex; flex-direction: column; }

/* Tier badges */
.tier { display: inline-block; width: 18px; height: 18px; line-height: 18px; text-align: center; border-radius: 3px; font-size: 11px; font-weight: bold; margin-right: 4px; }
.tier-S { background: var(--tier-s); color: #111; }
.tier-A { background: var(--tier-a); color: #111; }
.tier-B { background: var(--tier-b); color: #111; }
.tier-C { background: var(--tier-c); color: #fff; }
.tier-U { background: #555; color: #aaa; }

/* Feat/buff chips */
.chip-row { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.chip { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; cursor: pointer; user-select: none; background: #2a2d3a; border: 1px solid var(--border); }
.chip.on { background: #2a4a3a; border-color: var(--green); color: var(--green); }

/* Tier select dropdown coloring */
.opt-S { color: #f5c842; } .opt-A { color: #5baaff; } .opt-B { color: #8bc34a; } .opt-C { color: #888; }

/* ── Creature Cards — flat flex flow, no group wrappers ── */
.creatures-flow { display: flex; flex-wrap: wrap; gap: 6px; align-items: flex-start; }
.ccard { background: var(--card); border: 1px solid var(--border); border-radius: 5px; padding: 8px; min-width: 280px; max-width: 400px; flex: 1 1 300px; }
.group-tag { font-size: 9px; padding: 1px 6px; border-radius: 6px; background: #2a2d3a; color: var(--muted); margin-left: 4px; }
.casting-tag { background: var(--crit); color: #111; padding: 1px 8px; border-radius: 8px; font-size: 10px; font-weight: bold; }
.ccard.dead { opacity: 0.25; }
.ccard.casting { border-style: dashed; border-color: var(--crit); opacity: 0.7; }
.ccard-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.ccard-name { font-weight: bold; font-size: 13px; }
.ccard-hp { font-size: 12px; color: var(--muted); }
.hpbar { background: #111; border-radius: 2px; height: 4px; margin-bottom: 4px; }
.hpfill { height: 100%; border-radius: 2px; background: var(--green); transition: width 0.2s; }
.hpfill.low { background: var(--crit); }
.hpfill.crit { background: var(--red); }

/* Buff chips on creature */
.ccard .buff-chips { display: flex; gap: 2px; flex-wrap: wrap; margin-bottom: 4px; }
.ccard .buff-chip { font-size: 9px; padding: 1px 5px; border-radius: 6px; background: #2a4a3a; color: var(--green); cursor: pointer; }
.ccard .buff-chip.off { background: #3a2a2a; color: var(--red); text-decoration: line-through; }

/* ── Sorted Roll Table — THE KEY UX ── */
.roll-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.roll-table th { text-align: left; font-size: 10px; color: var(--muted); padding: 1px 4px; border-bottom: 1px solid var(--border); }
.roll-table td { padding: 2px 4px; }
.roll-table tr.hit td { color: var(--hit); }
.roll-table tr.miss td { color: var(--miss); }
.roll-table tr.crit td { color: var(--crit); font-weight: bold; }
.roll-table .total { font-weight: bold; font-size: 14px; }
.roll-table .dmg { font-weight: bold; font-size: 14px; }
.roll-table .special { font-size: 10px; color: var(--accent); }
/* Tooltip for breakdown */
.roll-table td[title] { cursor: help; border-bottom: 1px dotted var(--muted); }

/* AC threshold line */
.ac-line { border-top: 2px dashed var(--red); }
.ac-line td { padding-top: 4px; }

/* Roll summary */
.roll-summary { font-size: 12px; padding: 4px 0; display: flex; gap: 12px; flex-wrap: wrap; }
.roll-summary .total-dmg { color: var(--crit); font-weight: bold; font-size: 14px; }
.roll-summary .grab-info { color: var(--accent); }

/* ── Actions row ── */
.ccard-actions { display: flex; gap: 3px; margin-top: 4px; }

/* Effect cards */
.ecard { background: #2a2040; border: 1px solid #3a3060; border-radius: 5px; padding: 6px 10px; margin-bottom: 4px; display: flex; align-items: center; gap: 10px; }

/* Stat block panel */
.statblock { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 6px 8px; margin-top: 4px; font-size: 11px; display: none; }
.ccard.show-stats .statblock { display: block; }
.statblock .sb-row { display: flex; gap: 12px; flex-wrap: wrap; padding: 1px 0; }
.statblock .sb-label { color: var(--muted); min-width: 35px; }
.statblock .sb-val { color: var(--text); }
.statblock .sb-section { border-top: 1px solid var(--border); margin-top: 3px; padding-top: 3px; }
.statblock a { color: var(--accent); text-decoration: none; font-size: 10px; }
.statblock a:hover { text-decoration: underline; }
.sb-abilities { display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; text-align: center; }
.sb-abilities .ab-label { font-size: 9px; color: var(--muted); }
.sb-abilities .ab-val { font-weight: bold; }

/* pfsrd links for specials */
.sp-link { color: var(--accent); text-decoration: none; font-size: 10px; }
.sp-link:hover { text-decoration: underline; }

/* Inline HP edit */
.hp-inline { display: inline-flex; gap: 3px; align-items: center; }
.hp-inline input { width: 40px; font-size: 12px; text-align: center; padding: 2px; }
.hp-inline button { padding: 1px 6px; font-size: 11px; }

/* Pounce indicator */
.pounce-tag { background: #5a3a00; color: var(--crit); padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: bold; cursor: pointer; }
.pounce-tag.active { background: var(--crit); color: #111; }
</style>
</head>
<body>

<!-- ═══ Global Controls ═══ -->
<div class="panel row">
  <div><label>Reference AC</label><input type="number" id="ref-ac" value="" placeholder="?" min="1" max="50" onchange="render()"></div>
  <div><label>Caster Level</label><input type="number" id="inp-cl" value="10" min="1" max="20"></div>
  <div><label>&nbsp;</label><button class="act" onclick="reroll()">RE-ROLL ALL</button></div>
  <div><label>&nbsp;</label><button class="go" onclick="nextRound()">NEXT ROUND</button></div>
  <div><label>&nbsp;</label><button onclick="clearAll()">CLEAR</button></div>
  <div style="margin-left:auto;font-size:18px;font-weight:bold;color:var(--crit)">
    Rd <span id="disp-rd">0</span>
  </div>
</div>

<!-- ═══ Feats ═══ -->
<div class="panel chip-row">
  <label style="display:inline">Feats:</label>
  <span class="chip" data-feat="augment" onclick="tFeat(this)">Augment Summoning</span>
  <span class="chip" data-feat="superior" onclick="tFeat(this)">Superior Summoning</span>
  <span class="chip" data-feat="moonlight" onclick="tFeat(this)">Moonlight Summons</span>
  <span class="chip" data-feat="starlight" onclick="tFeat(this)">Starlight Summons</span>
</div>

<!-- ═══ Buffs ═══ -->
<div class="panel chip-row">
  <label style="display:inline">Buffs:</label>
  <span class="chip" data-buff="prayer" onclick="tBuff(this)">Prayer +1a/d</span>
  <span class="chip" data-buff="bless" onclick="tBuff(this)">Bless +1a</span>
  <span class="chip" data-buff="destruction" onclick="tBuff(this)">Destruct +4d</span>
  <span class="chip" data-buff="justice" onclick="tBuff(this)">Justice +3a</span>
  <span class="chip" data-buff="smiting" onclick="tBuff(this)">Smiting</span>
  <span class="chip" data-buff="haste" onclick="tBuff(this)">Haste +1a</span>
  <span class="chip" data-buff="flanking" onclick="tBuff(this)">Flank +2a</span>
  <span class="chip" data-buff="heroism" onclick="tBuff(this)">Heroism +2a</span>
  <span class="chip" data-buff="fh4" onclick="tBuff(this)">Fast Heal 4</span>
</div>

<!-- ═══ Summon Panel ═══ -->
<div class="panel">
  <div class="row">
    <div><label>Spell Slot</label><select id="inp-slot" onchange="updTiers()">
      <option value="1">1st</option><option value="2">2nd</option><option value="3">3rd</option>
      <option value="4" selected>4th</option><option value="5">5th</option><option value="6">6th</option>
      <option value="7">7th</option><option value="8">8th</option><option value="9">9th</option>
    </select></div>
    <div><label>Tier</label><select id="inp-tier" onchange="updCreatures()"></select></div>
    <div style="flex:1"><label>Creature</label><select id="inp-creature" style="width:100%"></select></div>
    <div><label>&nbsp;</label><button class="go" onclick="doSummon()">SUMMON</button></div>
  </div>
</div>

<!-- ═══ Quick Items ═══ -->
<div class="panel row">
  <label style="display:inline">Items:</label>
  <button onclick="summonLions()">Lion Figurines (2)</button>
  <button onclick="addEffect('sphere')">Flaming Sphere (wand CL3)</button>
  <button onclick="addEffect('sphere_cast')">Flaming Sphere (cast)</button>
</div>

<!-- ═══ Creatures ═══ -->
<div id="creatures-out"></div>

<!-- ═══ Effects ═══ -->
<div id="effects-out"></div>

<!-- ═══ Import ═══ -->
<details class="panel">
  <summary style="cursor:pointer;color:var(--muted);font-size:11px">Claude Import (JSON)</summary>
  <textarea id="inp-import" style="width:100%;height:40px;background:var(--bg);color:var(--text);border:1px solid var(--border);font-family:inherit;font-size:11px;padding:4px;margin-top:4px;border-radius:3px" placeholder='{"slot":4,"tier":"lower","creature":"Leopard","buffs":["prayer"]}'></textarea>
  <button class="sm" onclick="doImport()" style="margin-top:3px">Import</button>
</details>

<script>
// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let B = {}; // bestiary: name -> {data, sna_level}
let R = {}; // ratings: level -> name -> {tier, tags, note}
let S = { round:0, groups:[], effects:[], feats:{}, buffs:{} };
let nGid = 1, nCid = 1;

// ═══════════════════════════════════════════════════════════════
//  DICE (Crypto)
// ═══════════════════════════════════════════════════════════════
const rng = () => { const a = new Uint32Array(1); crypto.getRandomValues(a); return a[0]; };
const dd = s => (rng() % s) + 1;
const d20 = () => dd(20);
function rdice(n) {
  const m = n.match(/^(\d+)d(\d+)([+-]\d+)?$/);
  if (!m) return {t:0,r:[],m:0};
  const [nc,sc,mc] = [+m[1],+m[2],+(m[3]||0)];
  const rolls = Array.from({length:nc},()=>dd(sc));
  return {t:Math.max(1,rolls.reduce((a,b)=>a+b,0)+mc), r:rolls, m:mc};
}

// ═══════════════════════════════════════════════════════════════
//  BUFFS
// ═══════════════════════════════════════════════════════════════
const BD = {
  prayer:{a:1,d:1,s:1,ty:'morale'},bless:{a:1,d:0,s:0,ty:'morale'},
  destruction:{a:0,d:4,s:0,ty:'sacred'},justice:{a:3,d:0,s:0,ty:'sacred'},
  smiting:{a:0,d:0,s:0,ty:'sp'},haste:{a:1,d:0,s:0,ty:'haste',extra:1},
  flanking:{a:2,d:0,s:0,ty:'u'},heroism:{a:2,d:0,s:2,ty:'morale'},
  fh4:{a:0,d:0,s:0,ty:'sp',fh:4},
};
function bTotal(overrides) {
  const by = {};
  for (const [id,on] of Object.entries(S.buffs)) {
    if (!on) continue;
    if (overrides && overrides[id] === false) continue;
    const def = BD[id]; if (!def) continue;
    const t = def.ty;
    if (t==='u'||t==='sp'||t==='haste') {
      by[id] = by[id]||{a:0,d:0,s:0,extra:0,fh:0};
      by[id].a+=def.a; by[id].d+=def.d; by[id].s+=def.s;
      if(def.extra) by[id].extra=1; if(def.fh) by[id].fh=def.fh;
    } else {
      by[t]=by[t]||{a:0,d:0,s:0,extra:0,fh:0};
      by[t].a=Math.max(by[t].a,def.a); by[t].d=Math.max(by[t].d,def.d);
      by[t].s=Math.max(by[t].s,def.s);
      if(def.extra) by[t].extra=1; if(def.fh) by[t].fh=Math.max(by[t].fh,def.fh);
    }
  }
  const r={a:0,d:0,s:0,extra:0,fh:0};
  for(const v of Object.values(by)){r.a+=v.a;r.d+=v.d;r.s+=v.s;if(v.extra)r.extra=1;r.fh=Math.max(r.fh,v.fh||0);}
  return r;
}

// ═══════════════════════════════════════════════════════════════
//  MELEE PARSER
// ═══════════════════════════════════════════════════════════════
function parseMelee(str) {
  if(!str||str.toLowerCase()==='none') return [];
  const atks=[], segs=[]; let depth=0, cur='';
  for(const ch of str){if(ch==='('){depth++;cur+=ch;}else if(ch===')'){depth--;cur+=ch;}else if(ch===','&&depth===0){segs.push(cur.trim());cur='';}else cur+=ch;}
  if(cur.trim())segs.push(cur.trim());
  for(const seg of segs){
    const pm=seg.match(/\(([^)]+)\)/);let dmg='1d4',sp=[],cr=20,cm=2;
    if(pm){const pc=pm[1];const dm=pc.match(/^(\d+d\d+(?:[+-]\d+)?)/);if(dm)dmg=dm[1];
      const c1=pc.match(/\/(\d+)[–-]20/);if(c1)cr=+c1[1];const c2=pc.match(/[×x](\d+)/);if(c2)cm=+c2[1];
      for(const kw of['grab','trip','poison','constrict','rake','rend','attach','burn','pull','push'])if(pc.toLowerCase().includes(kw))sp.push(kw);
    }
    const bef=pm?seg.slice(0,seg.indexOf('(')).trim():seg.trim();
    const nm=bef.match(/^(?:(\d+)\s+)?([\w\s]+?)\s+([+-]?\d+)\s*$/);
    if(nm){const cnt=nm[1]?+nm[1]:1,name=nm[2].trim().replace(/s$/,''),bonus=+nm[3];
      for(let i=0;i<cnt;i++)atks.push({name:cnt>1?`${name} ${i+1}`:name,bonus,dmg,cr,cm,sp:[...sp]});
    }
  }
  return atks;
}

// ═══════════════════════════════════════════════════════════════
//  TIER LOGIC
// ═══════════════════════════════════════════════════════════════
function tierOpts(slot) {
  const o=[{id:'top',lbl:`1x SNA ${slot}`,sna:slot,expr:'1'}];
  if(slot>=2) o.push({id:'lower',lbl:`1d3 SNA ${slot-1}`,sna:slot-1,expr:'1d3'});
  if(slot>=3) o.push({id:'lowest',lbl:`1d4+1 SNA ${slot-2}`,sna:slot-2,expr:'1d4+1'});
  return o;
}
function rollCount(expr){if(expr==='1')return 1;let t=rdice(expr).t;if(S.feats.superior)t++;return t;}

function updTiers(){
  const slot=+document.getElementById('inp-slot').value;
  const sel=document.getElementById('inp-tier');
  const opts=tierOpts(slot);
  sel.innerHTML=opts.map(o=>`<option value="${o.id}">${o.lbl}${S.feats.superior&&o.expr!=='1'?' (+1 sup)':''}</option>`).join('');
  updCreatures();
}

function updCreatures(){
  const slot=+document.getElementById('inp-slot').value;
  const tierId=document.getElementById('inp-tier').value;
  const opts=tierOpts(slot);
  const tier=opts.find(o=>o.id===tierId)||opts[0];
  const sel=document.getElementById('inp-creature');
  const lvRatings = R[tier.sna] || {};
  const available=Object.values(B).filter(b=>b.sna_level===tier.sna)
    .sort((a,b)=>{
      const ra=lvRatings[a.data.name]?.tier||'U', rb=lvRatings[b.data.name]?.tier||'U';
      const order={S:0,A:1,B:2,C:3,U:4};
      return (order[ra]||4)-(order[rb]||4) || a.data.name.localeCompare(b.data.name);
    });
  // Sort: core first, then alternates; within each, by tier
  const sorted = available.sort((a,b)=>{
    const aAlt = a.data.is_alternate ? 1 : 0;
    const bAlt = b.data.is_alternate ? 1 : 0;
    if (aAlt !== bAlt) return aAlt - bAlt;
    const ra=lvRatings[a.data.name]?.tier||'U', rb=lvRatings[b.data.name]?.tier||'U';
    const order={S:0,A:1,B:2,C:3,U:4};
    return (order[ra]||4)-(order[rb]||4) || a.data.name.localeCompare(b.data.name);
  });
  // Tier symbols: colored dots that work in <option> elements
  const tierDot = {S:'★', A:'◆', B:'●', C:'○'};
  sel.innerHTML=sorted.map(b=>{
    const c=b.data.combat_card;
    const rating=lvRatings[b.data.name];
    const t=rating?.tier||'';
    const tags=rating?.tags?.join(', ')||'';
    const alt=b.data.is_alternate;
    const src=b.data.source||'core';
    const altTag=alt?` [${src}]`:'';
    const prefix=t?(tierDot[t]||'?')+' ':'  ';
    return `<option value="${b.data.name}">${prefix}${b.data.name} (HP${c.HP} AC${c.AC}${tags?' — '+tags:''})${altTag}</option>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
//  PRE-ROLL — sorted roll table
// ═══════════════════════════════════════════════════════════════
function preRoll(c) {
  // Store RAW dice rolls — bonuses computed at render time so buff toggles don't re-roll
  const rawRows = [];
  const rawGrabs = [];

  for (const atk of c.attacks) {
    const r = d20();
    const dr = rdice(atk.dmg);
    let critConf = 0, critDmgRaw = 0, fumbleConf = 0;
    const threat = r >= atk.cr && r !== 1;

    if (threat) {
      critConf = d20();
      // Crit multiplier: x2 = 1 extra roll, x3 = 2 extra rolls, x4 = 3 extra
      const extraRolls = (atk.cm || 2) - 1;
      critDmgRaw = 0;
      for (let cr = 0; cr < extraRolls; cr++) critDmgRaw += rdice(atk.dmg).t;
    }
    if (r === 1) {
      fumbleConf = d20();
    }

    rawRows.push({
      name: atk.name, r, baseBonus: atk.bonus, baseDmg: dr.t,
      critConf, critDmgRaw, fumbleConf, fumbleBonus: atk.bonus,
      cr: atk.cr, cm: atk.cm, specials: atk.sp,
      nat20: r===20, nat1: r===1, threat, isRake: false,
    });

    if (atk.sp.includes('grab') && c.cmb) {
      rawGrabs.push({ atk: atk.name, d20: d20(), baseCmb: c.cmb + 4 });
    }
  }

  // Maintain grapple roll (when grappling, not pouncing)
  let maintainRoll = null;
  if (c.grappling && !c.pouncing) {
    maintainRoll = { d20: d20(), baseCmb: c.cmb + 4 }; // +4 for grab
  }

  // Rake attacks (triggered by pounce OR started turn grappling)
  // Always pre-roll the dice so they're ready; display handles conditionality
  if (c.hasRake && (c.pouncing || c.grappling) && c.rakeAtks.length > 0) {
    for (const atk of c.rakeAtks) {
      const r = d20();
      const dr = rdice(atk.dmg);
      rawRows.push({
        name: atk.name, r, baseBonus: atk.bonus, baseDmg: dr.t,
        critConf:0, critDmgRaw:0, fumbleConf:0, fumbleBonus:atk.bonus,
        cr:20, cm:2, specials:atk.sp||[],
        nat20:r===20, nat1:r===1, threat:false, isRake:true,
        conditionalOnMaintain: c.grappling && !c.pouncing,
      });
    }
  }

  // Haste slot (raw roll, uses best attack bonus)
  const hasHaste = bTotal(c.buffOvr).extra; // check now but re-eval at render
  if (c.attacks.length > 0) {
    const best = c.attacks.reduce((a,x)=>a.bonus>x.bonus?a:x);
    const r = d20();
    const dr = rdice(best.dmg);
    rawRows.push({
      name:'Haste', r, baseBonus: best.bonus, baseDmg: dr.t,
      critConf:0, critDmgRaw:0, fumbleConf:0, fumbleBonus:best.bonus,
      cr:20, cm:2, specials:[],
      nat20:r===20, nat1:r===1, threat:false, isRake:false, isHaste:true,
    });
  }

  c.rawRoll = { rows: rawRows, grabs: rawGrabs, maintainRoll };
}

// Compute display rows from raw rolls + current buffs (called at render time)
function computeRoll(c) {
  if (!c.rawRoll) return null;
  const b = bTotal(c.buffOvr);
  const rows = [];
  const grabs = [];

  for (const raw of c.rawRoll.rows) {
    // Skip haste row if haste isn't active
    if (raw.isHaste && !b.extra) continue;

    const bonus = raw.baseBonus + b.a;
    const total = raw.r + bonus;
    const dmgBase = raw.baseDmg + b.d;
    let dmgWithCrit = dmgBase;
    let critOk = false, critConfTotal = 0;
    let fumbleConfTotal = 0;

    if (raw.threat) {
      critConfTotal = raw.critConf + bonus;
      critOk = true;
      const extraMults = (raw.cm || 2) - 1;
      dmgWithCrit = dmgBase + raw.critDmgRaw + (b.d * extraMults);
    }
    if (raw.nat1) {
      fumbleConfTotal = raw.fumbleConf + raw.fumbleBonus + b.a;
    }

    const hit_ac = raw.nat20 ? 999 : raw.nat1 ? 0 : total;

    rows.push({
      name: raw.name, r: raw.r, bonus, total, hit_ac,
      dmg: dmgWithCrit, dmgNoCrit: dmgBase,
      nat20: raw.nat20, nat1: raw.nat1, threat: raw.threat, critOk,
      critConf: raw.critConf, critConfTotal,
      fumbleConf: raw.fumbleConf, fumbleConfTotal,
      specials: raw.specials, isRake: raw.isRake, conditionalOnMaintain: raw.conditionalOnMaintain,
    });
  }

  for (const raw of c.rawRoll.grabs) {
    grabs.push({ atk: raw.atk, d20: raw.d20, total: raw.d20 + raw.baseCmb + b.a });
  }

  rows.sort((a, b) => b.total - a.total);

  // Compute maintain grapple total
  let maintain = null;
  if (c.rawRoll.maintainRoll) {
    const mr = c.rawRoll.maintainRoll;
    maintain = { d20: mr.d20, total: mr.d20 + mr.baseCmb + b.a };
  }

  return { rows, grabs, maintain };
}

function reroll() {
  for (const g of S.groups) for (const c of g.creatures) if (c.alive) preRoll(c);
  render();
}

// ═══════════════════════════════════════════════════════════════
//  CREATURE CREATION
// ═══════════════════════════════════════════════════════════════
function mkCreature(bEntry, aug) {
  const data = bEntry.data;
  const card = aug && data.augmented ? data.augmented : data.combat_card;
  const base = data.combat_card;
  const full = data.full_statblock || {};
  const specials = (card.Special_Attacks||base.Special_Attacks||'').toLowerCase();
  const hasPounce = specials.includes('pounce');
  const hasRake = specials.includes('rake');

  // Parse rake attacks from specials string
  // Format: "rake (2 claws +7, 1d6+4)" — count name bonus, damage
  let rakeAtks = [];
  if (hasRake) {
    const rm = specials.match(/rake\s*\(([^)]+)\)/);
    if (rm) {
      const rakeStr = rm[1]; // "2 claws +7, 1d6+4"
      const countM = rakeStr.match(/^(\d+)/);
      const bonusM = rakeStr.match(/([+-]\d+)/);
      const dmgM = rakeStr.match(/(\d+d\d+(?:[+-]\d+)?)/);
      const count = countM ? parseInt(countM[1]) : 2;
      const bonus = bonusM ? parseInt(bonusM[1]) : 0;
      const dmgStr = dmgM ? dmgM[1] : '1d4';
      for (let i = 0; i < count; i++) {
        rakeAtks.push({name:`Rake ${i+1}`, bonus, dmg:dmgStr, cr:20, cm:2, sp:['rake']});
      }
    }
    if (rakeAtks.length === 0) {
      // Fallback: use first claw attack stats
      const allAtks = parseMelee(card.Melee||base.Melee||'');
      const clawAtk = allAtks.find(a=>a.name.toLowerCase().includes('claw'));
      if (clawAtk) {
        rakeAtks = [
          {name:'Rake 1', bonus:clawAtk.bonus, dmg:clawAtk.dmg, cr:20, cm:2, sp:['rake']},
          {name:'Rake 2', bonus:clawAtk.bonus, dmg:clawAtk.dmg, cr:20, cm:2, sp:['rake']},
        ];
      }
    }
  }

  return {
    id:`C${nCid++}`, name:data.name, hp:card.HP||10, maxHp:card.HP||10,
    ac:card.AC||10, attacks:parseMelee(card.Melee||base.Melee||''), aug,
    cmb:card.CMB||base.CMB||0, cmd:card.CMD||base.CMD||10,
    fort:card.Fort||base.Fort||0, ref:card.Ref||base.Ref||0, will:card.Will||base.Will||0,
    speed:card.Speed||base.Speed||'30 ft.',
    specials, hasPounce, hasRake, rakeAtks,
    acBreak:card.AC_breakdown||base.AC_breakdown||'',
    specialAtks:card.Special_Attacks||base.Special_Attacks||'',
    specialQual:card.Special_Qualities||base.Special_Qualities||'',
    hd:card.HD||base.HD||'',
    // Full statblock
    str:aug?(full.Str||10)+4:(full.Str||10), dex:full.Dex||10,
    con:aug?(full.Con||10)+4:(full.Con||10), int:full.Int||2,
    wis:full.Wis||10, cha:full.Cha||2,
    bab:full.BAB||0, feats:full.Feats||'', skills:full.Skills||'',
    space:full.Space||'5 ft.', reach:full.Reach||'5 ft.',
    type:data.type||'', size:data.size||'', cr:data.cr||'',
    pfsrdUrl:data.pfsrd_url||'',
    specialAbilities: data.special_abilities || [],
    preRoll:null, alive:true, buffOvr:{}, pouncing:false, grappling:false,
  };
}

function doSummon() {
  const slot=+document.getElementById('inp-slot').value;
  const cl=+document.getElementById('inp-cl').value||10;
  const tierId=document.getElementById('inp-tier').value;
  const opts=tierOpts(slot);
  const tier=opts.find(o=>o.id===tierId)||opts[0];
  const name=document.getElementById('inp-creature').value;
  if(!name) return;
  const bE=B[name.toLowerCase()]; if(!bE) return;
  const count=rollCount(tier.expr);
  const aug=!!S.feats.augment;
  const g={id:`G${nGid++}`,name:`SNA ${slot}: ${count}x ${name}`,src:'sna',
    creatures:[],rl:cl,casting:true,slot};
  for(let i=0;i<count;i++) g.creatures.push(mkCreature(bE,aug));
  S.groups.push(g);
  if(S.round===0) S.round=1;
  for(const c of g.creatures) preRoll(c);
  render();
}

function summonLions(){
  const bE=B['lion']; if(!bE){alert('Lion not in bestiary');return;}
  const g={id:`G${nGid++}`,name:'Lion Figurines',src:'figurine',creatures:[],rl:99,casting:false};
  for(let i=0;i<2;i++){const c=mkCreature(bE,false);c.name='Lion';g.creatures.push(c);}
  S.groups.push(g);
  if(S.round===0) S.round=1;
  for(const c of g.creatures) preRoll(c);
  render();
}

function addEffect(type){
  const cl=+document.getElementById('inp-cl').value||10;
  if(type==='sphere') S.effects.push({id:`E${nGid++}`,name:'Flaming Sphere (wand)',rl:3,dc:13,dmg:'3d6',save:'Ref half',note:'CL3 wand. Move action to reposition.'});
  if(type==='sphere_cast') S.effects.push({id:`E${nGid++}`,name:'Flaming Sphere (cast)',rl:cl,dc:10+2+5,dmg:'3d6',save:'Ref half',note:`CL${cl}. Move action to reposition.`});
  if(S.round===0) S.round=1;
  render();
}

function rollEffect(eid){
  const e=S.effects.find(x=>x.id===eid);if(!e)return;
  const r=rdice(e.dmg);
  alert(`${e.name}: ${r.t} damage (${r.r.join('+')}${r.m>=0?'+':''}${r.m}) — DC ${e.dc} ${e.save}`);
}

// ═══════════════════════════════════════════════════════════════
//  ROUND
// ═══════════════════════════════════════════════════════════════
function nextRound(){
  S.round++;
  for(const g of S.groups){if(g.casting){g.casting=false;}else{g.rl--;}}
  S.groups=S.groups.filter(g=>{if(g.rl<=0&&g.src==='sna'){g.creatures.forEach(c=>{c.alive=false;});return false;}return true;});
  S.effects=S.effects.filter(e=>{e.rl--;return e.rl>0;});
  // Fast healing
  const fh=bTotal({}).fh;
  if(fh>0) for(const g of S.groups) for(const c of g.creatures) if(c.alive&&c.hp<c.maxHp) c.hp=Math.min(c.maxHp,c.hp+fh);
  reroll();
}

function render(){
  document.getElementById('disp-rd').textContent=S.round;
  document.querySelectorAll('.chip[data-feat]').forEach(el=>el.classList.toggle('on',!!S.feats[el.dataset.feat]));
  document.querySelectorAll('.chip[data-buff]').forEach(el=>el.classList.toggle('on',!!S.buffs[el.dataset.buff]));
  updTiers();

  const refACval = document.getElementById('ref-ac').value;
  const refAC = refACval === '' ? 0 : parseInt(refACval) || 0;
  const area=document.getElementById('creatures-out');
  // Flat flow: all cards in one flex container, group info embedded in each card
  let h='<div class="creatures-flow">';
  for(const g of S.groups){
    const rlTxt=g.src==='figurine'?'perm':`${g.rl}rd`;
    for(const c of g.creatures) h+=renderCard(c, g, refAC);
  }
  h+='</div>';
  // Group summaries as a compact bar above
  let gBar='';
  if(S.groups.length > 0) {
    gBar='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px;font-size:11px">';
    for(const g of S.groups){
      const alive=g.creatures.filter(c=>c.alive).length;
      const rlTxt=g.src==='figurine'?'perm':`${g.rl}rd`;
      gBar+=`<span style="background:var(--card);padding:2px 8px;border-radius:4px;border:1px solid var(--border)">
        ${g.name} ${alive}/${g.creatures.length} ${rlTxt}
        ${g.casting?'<span class="casting-tag">CASTING</span> <button class="sm" onclick="manifest(\''+g.id+'\')">GO</button>':''}
        <button class="sm" onclick="dismissG('${g.id}')" style="margin-left:4px">×</button>
      </span>`;
    }
    gBar+='</div>';
  }
  area.innerHTML=gBar+h;

  document.getElementById('effects-out').innerHTML=S.effects.map(e=>
    `<div class="ecard">${e.name} | ${e.dmg} DC ${e.dc} ${e.save} | ${e.rl}rd | <button class="sm" onclick="rollEffect('${e.id}')">Roll</button></div>`
  ).join('');
}

// d20pfsrd links for common special abilities
const PFSRD = {
  grab:'https://www.d20pfsrd.com/bestiary/rules-for-monsters/universal-monster-rules/#Grab',
  pounce:'https://www.d20pfsrd.com/bestiary/rules-for-monsters/universal-monster-rules/#Pounce',
  rake:'https://www.d20pfsrd.com/bestiary/rules-for-monsters/universal-monster-rules/#Rake',
  trip:'https://www.d20pfsrd.com/bestiary/rules-for-monsters/universal-monster-rules/#Trip',
  constrict:'https://www.d20pfsrd.com/bestiary/rules-for-monsters/universal-monster-rules/#Constrict',
  trample:'https://www.d20pfsrd.com/bestiary/rules-for-monsters/universal-monster-rules/#Trample',
  rend:'https://www.d20pfsrd.com/bestiary/rules-for-monsters/universal-monster-rules/#Rend',
  poison:'https://www.d20pfsrd.com/bestiary/rules-for-monsters/universal-monster-rules/#Poison',
  disease:'https://www.d20pfsrd.com/bestiary/rules-for-monsters/universal-monster-rules/#Disease',
  burn:'https://www.d20pfsrd.com/bestiary/rules-for-monsters/universal-monster-rules/#Burn',
};
function spLink(s) {
  const url = PFSRD[s.toLowerCase()];
  return url ? `<a class="sp-link" href="${url}" target="_blank" onclick="event.stopPropagation()">${s}</a>` : s;
}
function mod(score) { return Math.floor((score - 10) / 2); }
function fmtMod(n) { return n >= 0 ? `+${n}` : `${n}`; }

function renderCard(c, group, refAC) {
  const casting = group.casting;
  const pct=c.maxHp>0?(c.hp/c.maxHp*100):0;
  const hpCls=pct>50?'':pct>25?'low':'crit';
  const cardCls=(!c.alive?'dead':casting?'casting':'');
  const rlTxt=group.src==='figurine'?'perm':`${group.rl}rd`;
  const srcLabel = group.src==='figurine' ? 'FIG' : group.src==='effect' ? 'EFF' : `SNA${group.slot||'?'}`;
  const groupLabel=`<span class="group-tag">${srcLabel} ${rlTxt}</span>`;

  // Per-creature buff chips
  const activeBuffs = Object.entries(S.buffs).filter(([_,on])=>on);
  const buffHTML = activeBuffs.map(([id])=>{
    const off = c.buffOvr[id]===false;
    return `<span class="buff-chip ${off?'off':''}" onclick="event.stopPropagation();togCBuff('${c.id}','${id}')">${id}</span>`;
  }).join('');

  // Pounce toggle + grappling indicator
  const pounceHTML = c.hasPounce ?
    `<span class="pounce-tag ${c.pouncing?'active':''}" onclick="event.stopPropagation();togPounce('${c.id}')" title="Charge+pounce: rake without grapple">${c.pouncing?'POUNCING':'Pounce?'}</span>` : '';
  const grapHTML = c.hasRake ?
    `<span class="pounce-tag ${c.grappling?'active':''}" onclick="event.stopPropagation();togGrapple('${c.id}')" title="Started turn grappling: gets rake" style="background:${c.grappling?'var(--accent)':'#2a2a5a'};color:${c.grappling?'#fff':'var(--accent)'}">${c.grappling?'GRAPPLING':'Grapple?'}</span>` : '';

  // Roll table — compute from raw rolls + current buffs
  let tableHTML='', summaryHTML='', specialsHTML='';
  const pr = c.rawRoll ? computeRoll(c) : null;
  if(pr && c.alive) {
    const hasAC = refAC > 0;
    let hitDmg=0, hitCount=0, totalAtks=pr.rows.length;
    let acLineDrawn = false;

    const triggeredSpecials = new Set();
    tableHTML=`<table class="roll-table"><tr><th>Attack</th><th>Atk</th><th>Dmg</th><th></th></tr>`;
    for(const r of pr.rows){
      const isHit = hasAC ? r.hit_ac >= refAC : null;
      const critConfirmed = r.critOk && hasAC && r.critConfTotal >= refAC;
      const critPending = r.critOk && !hasAC;
      const fumbleFail = r.nat1 && hasAC && r.fumbleConfTotal < refAC;
      const fumbleSafe = r.nat1 && hasAC && r.fumbleConfTotal >= refAC;
      const fumblePending = r.nat1 && !hasAC;
      const effectiveDmg = critConfirmed ? r.dmg : r.dmgNoCrit;
      if(isHit) { hitDmg += effectiveDmg; hitCount++; }
      let acLine='';
      if(hasAC && !acLineDrawn && isHit===false){ acLineDrawn=true; acLine=' ac-line'; }

      let cls = '';
      if(fumbleFail) cls = '';
      else if(critConfirmed) cls = 'crit';
      else if(isHit===true) cls = 'hit';
      else if(isHit===false) cls = 'miss';

      // Compact tags
      let tag = '';
      if(critConfirmed) tag = `<b style="color:var(--crit)">CRIT!</b>`;
      else if(r.critOk && hasAC) tag = `<span style="color:var(--muted)">no conf</span>`;
      else if(critPending) tag = `<span style="color:var(--crit)">THREAT</span>`;
      else if(fumbleFail) tag = `<b style="color:var(--miss)">FUMBLE!</b>`;
      else if(fumbleSafe) tag = `<span style="color:var(--muted)">nat1</span>`;
      else if(fumblePending) tag = `<span style="color:var(--miss)">NAT1</span>`;

      const isConditionalRake = r.isRake && r.conditionalOnMaintain;
      const rakeTag=r.isRake?` <span style="color:var(--crit);font-size:9px">${isConditionalRake?'RK*':'RK'}</span>`:'';
      const dmgCell = hasAC ? (isHit ? effectiveDmg : '-') : `${r.dmgNoCrit}${r.critOk?`/${r.dmg}`:''}`;

      // Short special labels on the attack name (e.g., "sting +poison")
      const spLabels = r.specials.filter(s=>s!=='rake').map(s => `<span style="font-size:9px;color:var(--accent)">+${s}</span>`).join(' ');
      const nameCell = `${r.name}${rakeTag}${spLabels?' '+spLabels:''}`;

      // Track specials triggered by hits for the section below
      if ((isHit || !hasAC) && r.specials.length) {
        for (const s of r.specials.filter(x=>x!=='rake')) {
          triggeredSpecials.add(s);
        }
      }

      tableHTML+=`<tr class="${cls}${acLine}"><td>${nameCell}</td><td class="total">${r.total}</td><td class="dmg">${dmgCell}</td><td class="special">${tag}</td></tr>`;
    }
    tableHTML+=`</table>`;

    // ── Special Attacks section (below rule line) ──
    // Full descriptions, no truncation. Colored when triggered by a hit.
    const allSpecials = new Set();
    pr.rows.forEach(r => r.specials.forEach(s => { if(s!=='rake') allSpecials.add(s); }));

    if (allSpecials.size > 0) {
      specialsHTML = `<div style="border-top:1px solid var(--border);margin-top:4px;padding-top:4px;font-size:11px">`;
      for (const s of allSpecials) {
        const isTriggered = triggeredSpecials.has(s);
        const color = isTriggered ? (hasAC ? 'var(--hit)' : 'var(--text)') : 'var(--muted)';
        const label = isTriggered && hasAC ? 'ACTIVE — ' : '';
        const detail = c.specialAbilities?.find(a => a.name.toLowerCase().includes(s));
        const desc = detail ? detail.desc : '';
        specialsHTML += `<div style="color:${color};margin-bottom:2px">
          <b>${label}${spLink(s)}</b>${desc ? ': '+desc : ''}
        </div>`;
      }
      specialsHTML += `</div>`;
    }

    // Grab/maintain info
    const grabStr=pr.grabs.length?` | <span class="grab-info">${spLink('grab')}: ${pr.grabs.map(g=>`${g.total}`).join(', ')} vs CMD</span>`:'';
    const maintainStr=pr.maintain?` | <span style="color:var(--accent)">Maintain: <b>${pr.maintain.total}</b> vs CMD</span>`:'';
    // Count crits and fumbles for summary
    const nCrits = pr.rows.filter(r=>r.critOk && (!hasAC || r.critConfTotal >= refAC)).length;
    const nFumbles = pr.rows.filter(r=>r.nat1 && hasAC && r.fumbleConfTotal < refAC).length;
    const critNote = nCrits ? ` | <span style="color:var(--crit)">${nCrits} CRIT${nCrits>1?'S':''}</span>` : '';
    const fumbleNote = nFumbles ? ` | <span style="color:var(--miss)">${nFumbles} FUMBLE${nFumbles>1?'S':''}</span>` : '';

    if(hasAC) {
      summaryHTML=`<div class="roll-summary">
        <span>vs AC ${refAC}: <b style="color:var(--hit)">${hitCount}</b>/${totalAtks} hit</span>
        <span class="total-dmg">${hitDmg} dmg</span>${critNote}${fumbleNote}${grabStr}${maintainStr}
      </div>`;
    } else {
      const totNoCrit = pr.rows.reduce((a,r)=>a+r.dmgNoCrit,0);
      const totWithCrit = pr.rows.reduce((a,r)=>a+r.dmg,0);
      const threats = pr.rows.filter(r=>r.critOk).length;
      const fumbles = pr.rows.filter(r=>r.nat1).length;
      const tNote = threats ? ` | <span style="color:var(--crit)">${threats} threat${threats>1?'s':''}</span>` : '';
      const fNote = fumbles ? ` | <span style="color:var(--miss)">${fumbles} nat1${fumbles>1?'s':''}</span>` : '';
      summaryHTML=`<div class="roll-summary">
        <span>All totals: ${pr.rows.map(r=>r.total).join(', ')}</span>
        <span class="total-dmg">${totNoCrit} dmg${threats?` (${totWithCrit} w/crits)`:''}</span>${tNote}${fNote}${grabStr}${maintainStr}
      </div>`;
    }
  }

  // Stat block (hidden until toggled)
  const sbHTML = `<div class="statblock">
    <div class="sb-row">
      <span class="sb-label">AC</span><span class="sb-val">${c.ac} ${c.acBreak?'('+c.acBreak+')':''}</span>
    </div>
    <div class="sb-row">
      <span class="sb-label">HP</span><span class="sb-val">${c.maxHp} (${c.hd})</span>
      <span class="sb-label">Spd</span><span class="sb-val">${c.speed}</span>
    </div>
    <div class="sb-row">
      <span class="sb-label">Fort</span><span class="sb-val">${fmtMod(c.fort)}</span>
      <span class="sb-label">Ref</span><span class="sb-val">${fmtMod(c.ref)}</span>
      <span class="sb-label">Will</span><span class="sb-val">${fmtMod(c.will)}</span>
    </div>
    <div class="sb-row">
      <span class="sb-label">CMB</span><span class="sb-val">${fmtMod(c.cmb)}</span>
      <span class="sb-label">CMD</span><span class="sb-val">${c.cmd}</span>
      <span class="sb-label">BAB</span><span class="sb-val">${fmtMod(c.bab)}</span>
    </div>
    <div class="sb-abilities">
      <div><div class="ab-label">STR</div><div class="ab-val">${c.str}</div></div>
      <div><div class="ab-label">DEX</div><div class="ab-val">${c.dex}</div></div>
      <div><div class="ab-label">CON</div><div class="ab-val">${c.con}</div></div>
      <div><div class="ab-label">INT</div><div class="ab-val">${c.int}</div></div>
      <div><div class="ab-label">WIS</div><div class="ab-val">${c.wis}</div></div>
      <div><div class="ab-label">CHA</div><div class="ab-val">${c.cha}</div></div>
    </div>
    <div class="sb-section">
      <div class="sb-row"><span class="sb-label">Space</span><span class="sb-val">${c.space}</span><span class="sb-label">Reach</span><span class="sb-val">${c.reach}</span></div>
      ${c.specialAtks?`<div class="sb-row"><span class="sb-label">SA</span><span class="sb-val">${c.specialAtks}</span></div>`:''}
      ${c.specialQual?`<div class="sb-row"><span class="sb-label">SQ</span><span class="sb-val">${c.specialQual}</span></div>`:''}
      ${c.feats?`<div class="sb-row"><span class="sb-label">Feats</span><span class="sb-val">${c.feats}</span></div>`:''}
    </div>
    ${c.specialAbilities && c.specialAbilities.length ? `<div class="sb-section">${c.specialAbilities.map(a=>`<div class="sb-row"><span class="sb-label" style="color:var(--crit);min-width:auto">${a.name}</span><span class="sb-val" style="font-size:10px">${a.desc}</span></div>`).join('')}</div>` : ''}
    <div class="sb-section">
      <span>${c.type} | ${c.size} | CR ${c.cr}</span>
      ${c.pfsrdUrl?` | <a href="${c.pfsrdUrl}" target="_blank" onclick="event.stopPropagation()">d20pfsrd</a>`:''}
    </div>
  </div>`;

  // Inline HP controls
  const hpCtrl = `<div class="hp-inline">
    <button class="sm" onclick="event.stopPropagation();hpAdj('${c.id}',-5)" title="-5">-5</button>
    <button class="sm" onclick="event.stopPropagation();hpAdj('${c.id}',-1)" title="-1">-1</button>
    <input type="number" id="hp-${c.id}" value="" placeholder="±" onkeydown="if(event.key==='Enter'){event.stopPropagation();hpSet('${c.id}',this.value);this.value='';}" onclick="event.stopPropagation()">
    <button class="sm" onclick="event.stopPropagation();hpAdj('${c.id}',1)" title="+1">+1</button>
    <button class="sm" onclick="event.stopPropagation();hpAdj('${c.id}',5)" title="+5">+5</button>
  </div>`;

  return `<div class="ccard ${cardCls}" onclick="this.classList.toggle('show-stats')">
    <div class="ccard-head">
      <span class="ccard-name">${c.id}: ${c.name}${c.aug?' (aug)':''}${groupLabel}</span>
      <span class="ccard-hp">${c.hp}/${c.maxHp} AC${c.ac} CMD${c.cmd}</span>
    </div>
    <div class="hpbar"><div class="hpfill ${hpCls}" style="width:${pct}%"></div></div>
    <div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;margin-bottom:3px">
      ${buffHTML} ${pounceHTML} ${grapHTML}
    </div>
    ${hpCtrl}
    ${summaryHTML}${tableHTML}${specialsHTML||''}
    ${sbHTML}
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════════════════════════
function findC(id){for(const g of S.groups){const c=g.creatures.find(x=>x.id===id);if(c)return c;}return null;}
function dmgC(id,n){const c=findC(id);if(c){c.hp=Math.max(0,c.hp-n);if(c.hp<=0)c.alive=false;render();}}
function healC(id,n){const c=findC(id);if(c){c.hp=Math.min(c.maxHp,c.hp+n);c.alive=c.hp>0;render();}}
function hpAdj(id,n){const c=findC(id);if(c){c.hp=Math.max(0,Math.min(c.maxHp,c.hp+n));if(c.hp<=0)c.alive=false;render();}}
function hpSet(id,val){if(!val)return;const n=parseInt(val);if(isNaN(n))return;if(val.startsWith('+')||val.startsWith('-')){hpAdj(id,n);}else{const c=findC(id);if(c){c.hp=Math.max(0,Math.min(c.maxHp,n));if(c.hp<=0)c.alive=false;render();}}}
function togPounce(id){const c=findC(id);if(c){c.pouncing=!c.pouncing;if(c.pouncing)c.grappling=false;preRoll(c);render();}}
function togGrapple(id){const c=findC(id);if(c){c.grappling=!c.grappling;if(c.grappling)c.pouncing=false;preRoll(c);render();}}
function dismissG(gid){S.groups=S.groups.filter(g=>g.id!==gid);render();}
function manifest(gid){const g=S.groups.find(x=>x.id===gid);if(g){g.casting=false;render();}}
function tFeat(el){S.feats[el.dataset.feat]=!S.feats[el.dataset.feat];reroll();}
function tBuff(el){S.buffs[el.dataset.buff]=!S.buffs[el.dataset.buff];render();}
function togCBuff(cid,bid){
  for(const g of S.groups){const c=g.creatures.find(x=>x.id===cid);
    if(c){c.buffOvr[bid]=c.buffOvr[bid]===false?undefined:false;render();return;}}
}
function clearAll(){S.groups=[];S.effects=[];S.round=0;nCid=1;nGid=1;render();}
function doImport(){try{const j=JSON.parse(document.getElementById('inp-import').value);
  if(j.ac)document.getElementById('ref-ac').value=j.ac;
  if(j.buffs)for(const b of j.buffs)S.buffs[b]=true;
  if(j.slot)document.getElementById('inp-slot').value=j.slot;
  if(j.tier){updTiers();document.getElementById('inp-tier').value=j.tier;}
  updCreatures();
  if(j.creature){document.getElementById('inp-creature').value=j.creature;doSummon();}
  render();
}catch(e){alert('Bad JSON: '+e.message);}}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
async function init(){
  // Load bestiary
  for(const f of['statblocks/SNA-Bestiary-Levels-1-3.json','statblocks/SNA-Bestiary-Levels-4-6.json','statblocks/SNA-Bestiary-Levels-7-9.json']){
    try{const data=await(await fetch(f)).json();
      for(const lv of data.levels||[])for(const cr of lv.creatures||[])B[cr.name.toLowerCase()]={data:cr,sna_level:lv.sna_level};
    }catch(e){console.warn(f,e);}
  }
  // Load ratings
  try{const data=await(await fetch('creature-ratings.json')).json();
    for(const[lv,creatures] of Object.entries(data.ratings||{})){
      R[+lv]={};
      for(const[name,info] of Object.entries(creatures)) R[+lv][name]=info;
    }
  }catch(e){console.warn('ratings',e);}
  updTiers();
  render();
}
init();
</script>
