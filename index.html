<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNA Combat Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #121318; --surface: #1a1c24; --card: #22252e;
  --border: #2e3140; --text: #e0e0e8; --muted: #7a7f94;
  --hit: #4ecca3; --miss: #e05570; --crit: #f5c842;
  --accent: #5b8cf7; --green: #4ecca3; --red: #e05570;
  /* Tier colors */
  --tier-s: #f5c842; --tier-a: #5baaff; --tier-b: #8bc34a; --tier-c: #888;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'SF Mono', 'Consolas', 'Fira Code', monospace; background: var(--bg); color: var(--text); padding: 8px; font-size: 13px; line-height: 1.4; min-height: 100dvh; display: flex; flex-direction: column; }

.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; margin-bottom: 6px; }
button { font-family: inherit; background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; transition: all 0.15s ease; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
button:hover { background: #333648; }
button:active { transform: scale(0.96); }
button.act { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: bold; }
button.act:hover { box-shadow: 0 0 12px rgba(91, 140, 247, 0.4); }
button.go { background: var(--green); border-color: var(--green); color: #111; font-weight: bold; font-size: 14px; padding: 6px 20px; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 0 16px rgba(78, 204, 163, 0.2); }
button.go:hover { box-shadow: 0 0 20px rgba(78, 204, 163, 0.5); }
button.sm { padding: 2px 8px; font-size: 11px; }
select, input[type=number], input[type=text] { font-family: inherit; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 3px 6px; border-radius: 3px; font-size: 12px; }
select { min-width: 100px; }
input[type=number] { width: 50px; }
label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 1px; }
.row { display: flex; gap: 8px; align-items: end; flex-wrap: wrap; }
.row > div { display: flex; flex-direction: column; }

/* Tier badges */
.tier { display: inline-block; width: 18px; height: 18px; line-height: 18px; text-align: center; border-radius: 3px; font-size: 11px; font-weight: bold; margin-right: 4px; }
.tier-S { background: var(--tier-s); color: #111; }
.tier-A { background: var(--tier-a); color: #111; }
.tier-B { background: var(--tier-b); color: #111; }
.tier-C { background: var(--tier-c); color: #fff; }
.tier-U { background: #555; color: #aaa; }

/* Feat/buff chips */
.chip-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.chip { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; cursor: pointer; user-select: none; background: #2a2d3a; border: 1px solid var(--border); transition: all 0.2s ease; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
.chip.on { background: #2a4a3a; border-color: var(--green); color: var(--green); box-shadow: 0 0 6px rgba(78, 204, 163, 0.3); }

/* Custom creature dropdown */
.cdrop { position: relative; flex: 1; }
.cdrop-display { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 3px 6px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; min-height: 24px; }
.cdrop-display .tier { width: 14px; height: 14px; line-height: 14px; font-size: 9px; margin: 0; flex-shrink: 0; }
.cdrop-display::after { content: '▾'; margin-left: auto; color: var(--muted); }
.cdrop-list { display: none; position: absolute; bottom: 100%; left: 0; right: 0; max-height: min(320px, 50dvh); overflow-y: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 4px 4px 0 0; z-index: 100; scrollbar-width: thin; scrollbar-color: var(--border) var(--bg); }
.cdrop-list::-webkit-scrollbar { width: 6px; }
.cdrop-list::-webkit-scrollbar-track { background: var(--bg); }
.cdrop-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.cdrop-list::-webkit-scrollbar-thumb:hover { background: var(--muted); }
.cdrop.open .cdrop-list { display: block; }
.cdrop.open .cdrop-display { border-radius: 0 0 3px 3px; border-color: var(--accent); }
.cdrop-search { width: 100%; background: var(--bg); border: none; border-top: 1px solid var(--border); color: var(--text); padding: 4px 6px; font-family: inherit; font-size: 12px; outline: none; }
#cdrop-items { --name-col: 140px; }
.cdrop-item { padding: 3px 6px; cursor: pointer; font-size: 12px; display: grid; grid-template-columns: 24px var(--name-col) 1fr auto; align-items: center; gap: 0; }
.cdrop-item:hover, .cdrop-item.active { background: #333648; }
.cdrop-item .tier { width: 14px; height: 14px; line-height: 14px; font-size: 9px; margin: 0 6px 0 0; }
.cdrop-item .cdrop-stats { color: var(--muted); white-space: nowrap; font-size: 11px; text-align: right; }
.cdrop-display .cdrop-stats { margin-left: auto; }
.cdrop-stats .icon { margin-left: 2px; }
.cdrop-stats .icon-ac { margin-left: 5px; }
.cdrop-item .cdrop-name { color: var(--text); padding-left: 6px; }
.cdrop-item .cdrop-note { color: var(--muted); font-size: 10px; padding-left: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Creature Cards — flat CSS grid, no group wrappers ── */
#creatures-out { flex: 1; }
.creatures-flow { display: grid; grid-template-columns: repeat(auto-fill, 280px); gap: 16px; align-items: start; }
/* Group pill — centered on card top border, left-aligned, colored per group */
.gpill { position: absolute; top: 0; left: 12px; transform: translateY(-50%); font-size: 9px; padding: 1px 6px; border-radius: 6px; white-space: nowrap; z-index: 1; }
.gpill-0 { background: #1a3a2a; border: 1px solid #2a5a3a; color: #6cbf8a; }
.gpill-1 { background: #1a2a3a; border: 1px solid #2a4a5a; color: #6aaacf; }
.gpill-2 { background: #3a2a1a; border: 1px solid #5a4a2a; color: #cfaa6a; }
.gpill-3 { background: #2a1a3a; border: 1px solid #4a2a5a; color: #aa6acf; }
.gpill-4 { background: #3a1a1a; border: 1px solid #5a2a2a; color: #cf6a6a; }
/* Spell globe pill purples */
.gpill-sp-0 { background: #2a1a3a; border: 1px solid #4a2a5a; color: #aa6acf; }
.gpill-sp-1 { background: #1a1a3a; border: 1px solid #2a2a5a; color: #7a7acf; }
.gpill-sp-2 { background: #2a1a2a; border: 1px solid #5a2a4a; color: #cf6aaa; }
.gpill-sp-3 { background: #1a2a3a; border: 1px solid #2a3a5a; color: #6a9acf; }
.ccard { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; width: 280px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); position: relative; }
.group-tag { font-size: 10px; padding: 2px 6px; border-radius: 6px; background: #2a2d3a; color: var(--muted); margin-left: 6px; }
.casting-tag { background: var(--crit); color: #111; padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: bold; }
.ccard.dead { opacity: 0.25; }
@keyframes cast-pulse {
  0%, 100% { border-color: var(--crit); opacity: 0.7; }
  50% { border-color: #f5c84260; opacity: 0.5; }
}
.ccard.casting { border-style: dashed; border-color: var(--crit); animation: cast-pulse 2s ease-in-out infinite; }
.ccard-namerow { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2px; }
.ccard-name { font-family: 'Cinzel', serif; font-weight: 700; font-size: 13px; letter-spacing: 0.5px; line-height: 1.2; min-height: 2.4em; display: flex; align-items: flex-end; }
.ccard-dur { font-size: 9px; color: var(--muted); flex-shrink: 0; align-self: flex-end; }
.ccard-id { font-size: 10px; color: var(--text); position: absolute; top: 6px; right: 8px; display: flex; align-items: center; gap: 6px; }
.ccard-dismiss { color: var(--muted); cursor: pointer; font-size: 12px; }
.ccard-dismiss:hover { color: var(--red); }
.ccard-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.ccard-hp { font-size: 14px; color: #fff; font-weight: bold; white-space: nowrap; flex-shrink: 0; }
.ccard-ac { font-size: 11px; color: var(--muted); margin-left: auto; }
.ccard-cmd { font-size: 9px; color: var(--muted); flex-shrink: 0; margin-left: auto; }
.ccard-meta { font-size: 10px; color: var(--muted); margin-top: 6px; display: flex; flex-wrap: wrap; gap: 0 12px; }
.ccard-meta span { white-space: nowrap; }
.ccard-meta .meta-right { margin-left: auto; }
.aug-chip { font-size: 10px; padding: 2px 7px; border-radius: 8px; background: #3a3a20; color: var(--crit); border: 1px solid #5a5a30; }
/* Inline SVG icons — consistent sizing */
.icon { display: inline-block; width: 12px; height: 12px; vertical-align: -2px; margin: 0 2px; }
.icon:last-child { margin-right: 0; }
.icon-sm { width: 10px; height: 10px; vertical-align: -1px; margin: 0 1px; }
.icon-sm:last-child { margin-right: 0; }
.icon-hp { color: var(--red); }
.icon-ac { color: var(--accent); }
.icon-dmg { color: var(--crit); }
.icon-round { width: 18px; height: 18px; vertical-align: -3px; color: var(--crit); margin-right: 2px; }
.icon-pip { display: inline-block; width: 7px; height: 7px; vertical-align: 1px; }
/* Attack name pip column */
.atk-pips { display: inline-block; width: 10px; text-align: center; }
.atk-name { text-transform: lowercase; }
.atk-rake { color: var(--crit); }
/* Legend colors match pips */
.legend-grab { color: var(--accent); }
.legend-grab .sp-link { color: var(--accent); font-size: 11px; }
.legend-poison { color: #a0e050; }
.legend-poison .sp-link { color: #a0e050; font-size: 11px; }
.legend-trip { color: #f0a050; }
.legend-trip .sp-link { color: #f0a050; font-size: 11px; }
.legend-burn { color: #ff6030; }
.legend-burn .sp-link { color: #ff6030; font-size: 11px; }
.legend-disease { color: #c8b040; }
.legend-disease .sp-link { color: #c8b040; font-size: 11px; }
.legend-stun { color: #e0e0e8; }
.legend-stun .sp-link { color: #e0e0e8; font-size: 11px; }
/* Tactical badges — non-interactive, with tooltips */
.tac-badge { font-size: 9px; padding: 1px 5px; border-radius: 6px; background: #1a2a3a; color: #6aaacf; border: 1px solid #2a4a5a; cursor: help; position: relative; }
.tac-badge[title]:hover::after { content: attr(title); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; font-size: 10px; white-space: nowrap; z-index: 50; pointer-events: none; margin-bottom: 4px; }
/* HP controls + AC/CMD on same row */
.hp-row { display: flex; align-items: center; gap: 3px; margin-bottom: 6px; }
.hpbar { background: #111; border-radius: 2px; height: 4px; margin-bottom: 6px; cursor: pointer; }
.hpfill { height: 100%; border-radius: 2px; background: var(--green); transition: width 0.2s; box-shadow: 0 0 4px var(--green); width: calc(var(--hp-cur) / var(--hp-max) * 100%); }
.hpfill.low { background: var(--crit); box-shadow: 0 0 8px var(--crit); }
.hpfill.crit { background: var(--red); box-shadow: 0 0 12px var(--red); animation: pulse-hp 1.5s ease-in-out infinite; }
@keyframes pulse-hp {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

/* Buff chips on creature — unified with pounce/grapple */
.ccard .buff-chips { display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 4px; }
.ccard .buff-chip { font-size: 10px; padding: 2px 7px; border-radius: 8px; background: #2a4a3a; color: var(--green); cursor: pointer; border: 1px solid transparent; }
.ccard .buff-chip.off { background: #3a2a2a; color: var(--red); text-decoration: line-through; }

/* ── Sorted Roll Table — THE KEY UX ── */
.roll-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.roll-table th { text-align: left; font-size: 10px; color: var(--muted); padding: 2px 4px; border-bottom: 1px solid var(--border); }
.roll-table th.r { text-align: right; }
.roll-table .th-sum { color: var(--crit); font-size: 12px; font-weight: bold; cursor: help; }
.roll-table td { padding: 2px 4px; }
.roll-table tr.hit td { color: var(--hit); }
.roll-table tr.miss td { color: var(--miss); }
.roll-table tr.crit td { color: var(--crit); font-weight: bold; }
.roll-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
.roll-table .total { font-weight: bold; font-size: 14px; text-align: right; }
.roll-table .dmg { font-weight: bold; font-size: 14px; text-align: right; }
.roll-table .special { font-size: 10px; color: var(--accent); }
/* Tooltip for breakdown */
.roll-table td[title] { cursor: help; border-bottom: 1px dotted var(--muted); }

/* Auto-damage rows (constrict, maintain auto-dmg) */
.roll-table tr.auto-active td { color: var(--hit); }
.roll-table tr.auto-muted td { color: var(--muted); opacity: 0.5; }
.roll-table tr.auto-muted td.dmg { font-weight: normal; }

/* AC threshold line */
.ac-line { border-top: 2px dashed var(--red); }
.ac-line td { padding-top: 4px; }

/* Roll summary — table-aligned */
.roll-summary { font-size: 12px; padding: 6px 0 2px; }
.roll-summary-table { width: 100%; font-size: 12px; border-collapse: collapse; }
.roll-summary-table td { padding: 1px 4px; }
.roll-summary-table .total-dmg { color: var(--crit); font-weight: bold; font-size: 20px; text-align: right; }
.roll-summary-table .grab-info { color: var(--accent); font-size: 11px; }
.roll-summary-table .summary-label { color: var(--muted); }

/* Running total column */
.roll-table .running { font-size: 11px; color: var(--muted); text-align: right; }
.roll-table tr.hit .running { color: var(--hit); font-weight: bold; }

/* ── Actions row ── */
.ccard-actions { display: flex; gap: 3px; margin-top: 4px; }

/* Spell effect cards (in creatures-flow) */
.scard { background: #2a2040; border: 1px solid #3a3060; border-radius: 6px; padding: 10px 12px; width: 280px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); position: relative; }
.scard-namerow { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 4px; }
.scard-name { font-family: 'Cinzel', serif; font-weight: 700; font-size: 12px; letter-spacing: 0.5px; color: #c0b0e0; }
.scard-id { font-size: 10px; color: #8070a0; position: absolute; top: 6px; right: 8px; display: flex; align-items: center; gap: 6px; }
.scard-dismiss { color: #8070a0; cursor: pointer; font-size: 12px; }
.scard-dismiss:hover { color: var(--red); }
.scard-meta { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: #8070a0; margin-bottom: 4px; }
.scard-dice { color: #c0b0e0; }
.scard-dc { font-size: 11px; color: #a090c0; margin-bottom: 6px; }
.scard-result { background: #1a1530; border: 1px solid #3a3060; border-radius: 4px; padding: 6px 10px; text-align: center; margin-bottom: 6px; }
.scard-dmg { font-size: 22px; font-weight: bold; color: var(--crit); }
.scard-breakdown { font-size: 11px; color: #8070a0; margin-top: 2px; }
.scard-actions { display: flex; gap: 4px; margin-bottom: 4px; }
.scard-note { font-size: 10px; color: #606080; line-height: 1.3; }

/* Stat block panel */
.statblock { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 6px 8px; margin-top: 4px; font-size: 11px; display: none; }
.ccard.show-stats .statblock { display: block; }
.statblock .sb-row { display: flex; gap: 12px; flex-wrap: wrap; padding: 1px 0; }
.statblock .sb-label { color: var(--muted); min-width: 35px; }
.statblock .sb-val { color: var(--text); }
.statblock .sb-section { border-top: 1px solid var(--border); margin-top: 3px; padding-top: 3px; }
.statblock a { color: var(--accent); text-decoration: none; font-size: 10px; }
.statblock a:hover { text-decoration: underline; }
.sb-abilities { display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; text-align: center; }
.sb-abilities .ab-label { font-size: 9px; color: var(--muted); }
.sb-abilities .ab-val { font-weight: bold; }

/* pfsrd links for specials */
.sp-link { color: var(--accent); text-decoration: none; font-size: 10px; }
.sp-link:hover { text-decoration: underline; }

/* HP tap target (replaces hp-compact) */
.hp-tap { cursor: pointer; padding: 2px 6px; border-radius: 4px; transition: background 0.15s; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
.hp-tap:hover { background: rgba(255,255,255,0.06); }
.hp-tap:active { background: rgba(255,255,255,0.1); }
/* AC tap target in dock */
.ac-tap { cursor: pointer; padding: 2px 6px; border-radius: 4px; font-size: 14px; font-weight: bold; transition: background 0.15s; touch-action: manipulation; -webkit-tap-highlight-color: transparent; border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 0; }
.ac-tap:hover { background: rgba(255,255,255,0.06); border-color: var(--accent); }
.ac-tap-label { font-size: 8px; color: var(--muted); letter-spacing: 0.5px; line-height: 1; }
.ac-tap .ac-val { color: var(--text); }
.ac-tap .ac-val.empty { color: var(--muted); }

/* Numpad popup */
.numpad { display: none; position: fixed; z-index: 200; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 6px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); touch-action: manipulation; }
.numpad.open { display: block; }
.numpad-display { text-align: center; font-size: 20px; font-weight: bold; padding: 6px 8px; margin-bottom: 4px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; min-width: 140px; min-height: 36px; line-height: 36px; }
.numpad-display .np-sign { color: var(--muted); }
.numpad-display .np-sign.heal { color: var(--green); }
.numpad-display .np-sign.dmg { color: var(--red); }
.numpad-grid { display: grid; grid-template-columns: repeat(3, 48px); gap: 4px; }
.numpad-grid button { width: 48px; height: 44px; font-size: 18px; font-weight: bold; font-family: inherit; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent; transition: background 0.1s; }
.numpad-grid button:hover { background: #333648; }
.numpad-grid button:active { background: #444a60; transform: scale(0.95); }
.numpad-grid .np-sign-btn { font-size: 14px; color: var(--muted); }
.numpad-grid .np-sign-btn.heal { color: var(--green); }
.numpad-grid .np-sign-btn.dmg { color: var(--red); }
.numpad-grid .np-ok { background: var(--green); color: #111; border-color: var(--green); }
.numpad-grid .np-ok:hover { box-shadow: 0 0 10px rgba(78,204,163,0.4); }
.numpad-grid .np-ac-label { font-size: 11px; color: var(--accent); cursor: default; background: transparent; border-color: transparent; }
.numpad-label { text-align: center; font-size: 10px; color: var(--muted); margin-bottom: 2px; }

/* Pounce/Grapple — same sizing as buff chips */
.pounce-tag { background: transparent; color: var(--crit); padding: 2px 7px; border-radius: 8px; font-size: 10px; font-weight: bold; cursor: pointer; border: 1px solid #5a4a20; transition: all 0.15s; }
.pounce-tag:hover { background: #3a2a00; border-color: var(--crit); }
.pounce-tag.active { background: var(--crit); color: #111; border-color: var(--crit); }
.grapple-tag { background: transparent; color: var(--accent); padding: 2px 7px; border-radius: 8px; font-size: 10px; font-weight: bold; cursor: pointer; border: 1px solid #3a3a5a; transition: all 0.15s; }
.grapple-tag:hover { background: #1a1a3a; border-color: var(--accent); }
.grapple-tag.active { background: var(--accent); color: #fff; border-color: var(--accent); }
/* Flanking tag — outlined, filled when active */
.flank-tag { background: transparent; color: #6cbf8a; padding: 2px 7px; border-radius: 8px; font-size: 10px; font-weight: bold; cursor: pointer; border: 1px solid #3a5a4a; transition: all 0.15s; }
.flank-tag:hover { background: #1a3a2a; border-color: #6cbf8a; }
.flank-tag.active { background: #2a5a3a; color: #8fefa8; border-color: #6cbf8a; }
/* Power Attack tag — outlined, filled when active */
.pa-tag { background: transparent; color: #cf6a6a; padding: 2px 7px; border-radius: 8px; font-size: 10px; font-weight: bold; cursor: pointer; border: 1px solid #5a3a3a; transition: all 0.15s; }
.pa-tag:hover { background: #3a1a1a; border-color: #cf6a6a; }
.pa-tag.active { background: #5a2a2a; color: #ff8a8a; border-color: #cf6a6a; }
/* Notable feat badges */
.feat-badge { font-size: 9px; padding: 1px 5px; border-radius: 6px; background: #2a2d3a; color: var(--muted); border: 1px solid var(--border); }
/* Decisions row — pre-turn toggles above attack table */
.decisions-row { display: flex; gap: 4px; align-items: center; margin-bottom: 4px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
.decisions-row:has(+ .feat-badge-row) { border-bottom: none; padding-bottom: 0; }
.decisions-right { margin-left: auto; }
.feat-badge-row { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 4px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
/* Muted buff chips (bottom of card) */
.buff-chips-muted { display: flex; gap: 3px; flex-wrap: wrap; align-items: center; margin-top: 4px; padding-top: 4px; border-top: 1px solid var(--border); }
.buff-chips-muted .buff-chip { font-size: 9px; padding: 1px 5px; opacity: 0.5; }
.buff-chips-muted .buff-chip:hover { opacity: 1; }
.buff-chips-muted .buff-chip.local { border-color: var(--accent); opacity: 0.7; }
.buff-chips-muted .aug-chip { font-size: 9px; padding: 1px 5px; opacity: 0.5; }
/* Buff add button */
.buff-add-btn { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; background: var(--border); color: var(--muted); font-size: 11px; cursor: pointer; font-weight: bold; line-height: 1; }
.buff-add-btn:hover { background: var(--accent); color: #fff; }
/* Buff add popup */
.buff-add-popup { position: fixed; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 4px; z-index: 200; min-width: 120px; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
.buff-add-popup .buff-add-item { padding: 4px 8px; cursor: pointer; font-size: 11px; border-radius: 3px; color: var(--muted); }
.buff-add-popup .buff-add-item:hover { background: #333648; }
.buff-add-popup .buff-add-detail { color: var(--muted); }

/* ── Inline-style replacements ── */
.label-inline { display: inline; }
/* Title bar */
.title-bar { display: flex; justify-content: space-between; align-items: center; padding: 4px 10px; margin-bottom: 4px; }
.app-title { font-family: 'Cinzel', serif; font-size: 14px; font-weight: 700; color: var(--muted); letter-spacing: 1px; }
.import-toggle { font-size: 11px; color: var(--muted); cursor: pointer; }


/* Combat/Round bar (bottom) */
.combat-bar { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; border-color: var(--accent); border-left: 3px solid var(--accent); overflow: visible; position: relative; }
.round-display { font-family: 'Cinzel', serif; font-size: 18px; font-weight: 700; color: var(--crit); margin-right: 4px; }
.round-ac { display: flex; align-items: center; gap: 2px; }
.round-actions { display: flex; gap: 6px; margin-left: auto; align-items: center; }
.buff-ac-ref { margin-left: auto; display: flex; align-items: center; gap: 4px; }

/* Bottom dock — round bar + slide-up trays */
.bottom-dock { position: sticky; bottom: 0; z-index: 50; background: var(--bg); }

/* Tray panels slide up from the bar */
.tray-panel { max-height: 0; overflow: hidden; transition: max-height 0.25s ease; }
.tray-panel.open { max-height: 300px; overflow: visible; }
.tray-panel .panel { margin-bottom: 0; border-bottom: none; border-radius: 4px 4px 0 0; border-color: var(--border); padding: 12px 14px; }

/* Tray tabs — poke above dock top edge, merge into dock interior */
.tray-tabs { display: flex; gap: 0; align-self: stretch; flex: 1; justify-content: center; }
.tray-tab { font-size: 10px; padding: 2px 14px; background: var(--surface); border: 1px solid var(--border); border-bottom: none; border-radius: 3px 3px 0 0; color: var(--muted); cursor: pointer; transition: all 0.15s; position: relative; top: -9px; margin-bottom: -9px; margin-right: 2px; display: flex; align-items: center; }
.tray-tab:hover { color: var(--text); background: var(--card); }
.tray-tab.active { background: var(--surface); color: var(--text); border-color: var(--accent); z-index: 1; }
.tray-tab.has-items { color: var(--red); }
#tab-summon { font-weight: 700; color: var(--crit); min-width: 72px; justify-content: center; letter-spacing: 0.5px; }
#tab-summon.active { color: var(--crit); border-color: var(--crit); }
.bar-dismissed:empty { display: none; }
.import-toggle:hover { color: var(--text); }
/* Bar hierarchy — left border accent */
.bar-buffs { border-left: 3px solid var(--green); }
.bar-summon { border-left: 3px solid var(--crit); }
.bar-items { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.bar-setup { border-left: 3px solid var(--muted); }
/* Dismissed tray */
.dismissed-bar { font-size: 11px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; border-left: 3px solid var(--muted); }
.dismissed-label { color: var(--muted); }
.import-tray { display: none; }
.import-tray.open { display: block; }
.import-tray .row { margin-bottom: 4px; display: flex; gap: 6px; align-items: center; }
.flex-grow { flex: 1; }
.flex-grow select { width: 100%; }
.import-textarea { flex: 1; height: 28px; background: var(--bg); color: var(--text); border: 1px solid var(--border); font-family: inherit; font-size: 11px; padding: 4px; border-radius: 3px; resize: none; }
.import-btn { margin-top: 3px; }
.dismiss-btn { margin-left: 4px; }

/* Group summary bar */
.group-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; font-size: 11px; }
.group-summary { background: var(--card); padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border); transition: border-color 0.3s; }
.group-summary[data-rl="1"], .group-summary[data-rl="2"] { border-color: var(--red); color: var(--red); }

/* Creature card rows */
.buff-pounce-row { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

/* Roll table tags */
.tag-crit { color: var(--crit); font-weight: bold; }
.tag-threat { color: var(--crit); }
.tag-fumble { color: var(--miss); font-weight: bold; }
.tag-nat1 { color: var(--miss); }
.tag-muted { color: var(--muted); }
.tag-hit { color: var(--hit); }

/* Rake/special inline labels */
.rake-label { color: var(--crit); font-size: 10px; }
.sp-label-tag { font-size: 10px; color: var(--accent); }

/* Specials legend below roll table */
.specials-section { margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); font-size: 11px; }
.special-legend { color: var(--muted); margin-bottom: 2px; }
.special-legend .sp-link { font-size: 11px; }
.legend-active { font-weight: bold; color: rgba(78,204,163,0.1); background: linear-gradient(90deg, var(--hit), var(--crit) 50%, var(--hit)); background-size: 80px 100%; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: legend-shimmer 1.2s linear infinite; background-repeat: no-repeat; background-color: var(--hit); }
.shimmer-blue { font-weight: bold; color: rgba(91,140,247,0.1); background: linear-gradient(90deg, var(--accent), #e0e8ff 50%, var(--accent)); background-size: 80px 100%; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: legend-shimmer 1.2s linear infinite; background-repeat: no-repeat; background-color: var(--accent); }
.shimmer-red { font-weight: bold; color: rgba(224,85,112,0.1); background: linear-gradient(90deg, var(--red), #ffccdd 50%, var(--red)); background-size: 80px 100%; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: legend-shimmer 1.2s linear infinite; background-repeat: no-repeat; background-color: var(--red); }
@keyframes legend-shimmer {
  0% { background-position: -80px 0; }
  100% { background-position: calc(100% + 80px) 0; }
}

/* Stat block special abilities */
.sb-sa-label { color: var(--crit); min-width: auto; }
.sb-sa-val { font-size: 10px; }

/* Key ability section (above roll table) */
.ability-section { border: 1px solid #3a2a50; background: #1e1a2a; border-radius: 4px; padding: 6px 8px; margin-bottom: 6px; font-size: 11px; }
.ability-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.ability-name { color: #c4a0ff; font-weight: bold; }
.ability-type { color: var(--muted); font-size: 9px; }
.ability-dc { color: var(--crit); font-weight: bold; }
.ability-detail { color: var(--muted); font-size: 10px; }

/* Dead creature — rotated sideways */
.ccard.dead { opacity: 1; transform-origin: top left; transition: transform 0.3s ease, width 0.3s ease, height 0.3s ease;
  transform: rotate(-90deg) translateX(-100%); width: 280px; min-width: 0; height: auto; }
.ccard.dead .ccard-head { opacity: 0.5; }
.ccard.dead .hpbar { opacity: 0.3; }
.dead-bar { display: flex; align-items: center; gap: 6px; padding: 2px 0; }
.dead-label { font-size: 10px; color: var(--red); font-weight: bold; }
.revive-btn { font-size: 10px; padding: 1px 8px; background: #2a3a2a; border-color: var(--green); color: var(--green); }
.revive-btn:hover { background: #3a4a3a; }
/* Wrapper to reserve correct layout space for rotated card */
.dead-wrap { display: inline-block; vertical-align: top; width: 80px; height: 280px; }


/* ── iPad / Tablet responsive (≤1024px) ── */
@media (max-width: 1024px) {
  body { padding: 4px; font-size: 12px; }
  .panel { padding: 6px 8px; margin-bottom: 4px; }

  /* Touch-friendly targets: minimum 44px tap zones */
  button { min-height: 36px; padding: 6px 12px; }
  button.sm { min-height: 28px; padding: 3px 10px; font-size: 11px; }
  button.go { padding: 8px 20px; }
  .chip { padding: 4px 10px; min-height: 28px; line-height: 20px; }
  .hp-tap { padding: 4px 8px; }
  .pounce-tag, .grapple-tag, .flank-tag, .pa-tag { padding: 4px 10px; min-height: 28px; }

  /* Narrower cards to fit more across */
  .ccard { width: 260px; padding: 8px 10px; }
  .scard { width: 260px; }
  .creatures-flow { grid-template-columns: repeat(auto-fill, 260px); }
  .creatures-flow { gap: 10px; }

  /* Tighter group bar */
  .group-bar { gap: 4px; margin-bottom: 3px; font-size: 10px; }
  .group-summary { padding: 2px 6px; }

  /* Creature dropdown touch-friendly */
  .cdrop-item { padding: 6px 8px; min-height: 36px; }
  .cdrop-search { padding: 8px; font-size: 14px; }
  .cdrop-display { min-height: 36px; padding: 6px 8px; }

  /* Summon panel tighter */
  .row { gap: 6px; }

  /* Dock tabs touch-friendly */
  .tray-tab { padding: 4px 12px; font-size: 11px; min-height: 36px; top: -7px; margin-bottom: -7px; }
  #tab-summon { min-width: 80px; }
}

/* ── Phone / narrow portrait (≤480px) ── */
@media (max-width: 480px) {
  .ccard { width: 100%; }
  .scard { width: 100%; }
  .creatures-flow { grid-template-columns: 1fr; }
  .creatures-flow { gap: 4px; }
}
</style>
</head>
<body>

<!-- ═══ Title Bar ═══ -->
<div class="title-bar">
  <span class="app-title">SNA Combat Manager</span>
  <span class="import-toggle" onclick="document.getElementById('import-tray').classList.toggle('open')">⚙ Import</span>
</div>

<!-- ═══ Import Tray (Claude JSON) — hidden by default ═══ -->
<div class="panel import-tray" id="import-tray">
  <div class="row">
    <textarea id="inp-import" class="import-textarea" placeholder='{"slot":4,"tier":"lower","creature":"Leopard","buffs":["prayer"]}'></textarea>
    <button class="sm import-btn" onclick="doImport()">Import</button>
  </div>
</div>


<!-- ═══ Creatures + Spell Cards (main viewport) ═══ -->
<div id="creatures-out"></div>

<!-- ═══ Numpad Popup ═══ -->
<div class="numpad" id="numpad">
  <div class="numpad-label" id="np-label"></div>
  <div class="numpad-display" id="np-display" onclick="numpadClear()"></div>
  <div class="numpad-grid">
    <button onclick="numpadKey('7')">7</button><button onclick="numpadKey('8')">8</button><button onclick="numpadKey('9')">9</button>
    <button onclick="numpadKey('4')">4</button><button onclick="numpadKey('5')">5</button><button onclick="numpadKey('6')">6</button>
    <button onclick="numpadKey('1')">1</button><button onclick="numpadKey('2')">2</button><button onclick="numpadKey('3')">3</button>
    <button id="np-sign-btn" onclick="numpadKey('sign')">±</button><button onclick="numpadKey('0')">0</button><button class="np-ok" onclick="numpadKey('ok')">✓</button>
  </div>
</div>

<!-- ═══ Bottom Dock ═══ -->
<div class="bottom-dock">
  <!-- Tray panels (slide up independently) -->
  <div class="tray-panel" id="tray-summon">
    <div class="panel bar-summon">
      <div class="row">
        <div><label>Spell Slot</label><select id="inp-slot" onchange="updTiers()">
          <option value="1">1st</option><option value="2">2nd</option><option value="3">3rd</option>
          <option value="4" selected>4th</option><option value="5">5th</option><option value="6">6th</option>
          <option value="7">7th</option><option value="8">8th</option><option value="9">9th</option>
        </select></div>
        <div><label>Tier</label><select id="inp-tier" onchange="updCreatures()"></select></div>
        <div class="cdrop" id="creature-drop">
          <label>Creature</label>
          <div class="cdrop-display" onclick="toggleCreatureDrop()"><span id="cdrop-text">Select...</span></div>
          <div class="cdrop-list">
            <div id="cdrop-items"></div>
            <input class="cdrop-search" type="text" placeholder="Search..." oninput="filterCreatures(this.value)">
          </div>
        </div>
        <div><label>&nbsp;</label><button class="go" onclick="doSummon()">SUMMON</button></div>
      </div>

        <button onclick="summonLions()">Lion Figurines (2)</button>
      </div>

        <button onclick="addSpell('sphere')">Flaming Sphere</button>
        <button onclick="addSpell('sphere_wand')">Flaming Sphere (wand)</button>
        <button onclick="addSpell('ball_lightning')">Ball Lightning</button>

  </div>
  <div class="tray-panel" id="tray-buffs">

      <span class="chip" data-buff="prayer" onclick="tBuff(this)">Prayer +1a/d</span>
      <span class="chip" data-buff="bless" onclick="tBuff(this)">Bless +1a</span>
      <span class="chip" data-buff="destruction" onclick="tBuff(this)">Destruct +4d</span>
      <span class="chip" data-buff="justice" onclick="tBuff(this)">Justice +3a</span>
      <span class="chip" data-buff="smiting" onclick="tBuff(this)">Smiting</span>
      <span class="chip" data-buff="haste" onclick="tBuff(this)">Haste +1a</span>
      <span class="chip" data-buff="heroism" onclick="tBuff(this)">Heroism +2a</span>
      <span class="chip" data-buff="fh4" onclick="tBuff(this)">Fast Heal 4</span>

  </div>
  <div class="tray-panel" id="tray-dismissed">
    <div class="panel bar-dismissed" id="dismissed-content"></div>
  </div>

    <div class="round-display"><svg class="icon icon-round" viewBox="0 0 24 24"><path fill="currentColor" d="M12 6v3l4-4l-4-4v3a8 8 0 0 0-8 8c0 1.57.46 3.03 1.24 4.26L6.7 14.8A5.9 5.9 0 0 1 6 12a6 6 0 0 1 6-6m6.76 1.74L17.3 9.2c.44.84.7 1.8.7 2.8a6 6 0 0 1-6 6v-3l-4 4l4 4v-3a8 8 0 0 0 8-8c0-1.57-.46-3.03-1.24-4.26"/></svg><span id="disp-rd">0</span></div>
    <span class="round-ac ac-tap" onclick="openNumpad('ac',null,this)"><span class="ac-tap-label">TARGET AC</span><span><svg class="icon icon-sm icon-ac" viewBox="0 0 24 24"><path fill="currentColor" d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12c5.16-1.26 9-6.45 9-12V5z"/></svg><span id="disp-ac" class="ac-val empty">?</span></span></span>
    <input type="hidden" id="ref-ac" value="">
    <div class="tray-tabs">
      <button class="tray-tab" onclick="toggleTray('summon')" id="tab-summon">Summon</button>

</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let B = {}; // bestiary: name -> {data, sna_level}
let R = {}; // ratings: level -> name -> {tier, tags, note}
let S = { round:0, groups:[], effects:[], feats:{}, buffs:{} };
let nGid = 1, nCid = 1, addBuffPopup = null;

// ═══════════════════════════════════════════════════════════════
//  ICONS (inline SVG)
// ═══════════════════════════════════════════════════════════════
const IC = {
  // MDI filled icon set — consistent style on dark backgrounds

  dmg: (cls='') => `<svg class="icon icon-dmg ${cls}" viewBox="0 0 24 24"><path fill="currentColor" d="m12 21.35l-1.45-1.32C5.4 15.36 2 12.27 2 8.5C2 5.41 4.42 3 7.5 3c.67 0 1.32.12 1.94.33L13 9.35l-4 5zM16.5 3C19.58 3 22 5.41 22 8.5c0 3.77-3.4 6.86-8.55 11.53L12 21.35l-1-7l4.5-5l-2.65-5.08C13.87 3.47 15.17 3 16.5 3"/></svg>`,

  cycle: (cls='') => `<svg class="icon ${cls}" viewBox="0 0 24 24"><path fill="currentColor" d="M12 6v3l4-4l-4-4v3a8 8 0 0 0-8 8c0 1.57.46 3.03 1.24 4.26L6.7 14.8A5.9 5.9 0 0 1 6 12a6 6 0 0 1 6-6m6.76 1.74L17.3 9.2c.44.84.7 1.8.7 2.8a6 6 0 0 1-6 6v-3l-4 4l4 4v-3a8 8 0 0 0 8-8c0-1.57-.46-3.03-1.24-4.26"/></svg>`,

  countdown: (cls='') => `<svg class="icon ${cls}" viewBox="0 0 24 24"><path fill="currentColor" d="m19.03 7.39l1.42-1.42c-.45-.51-.9-.97-1.41-1.41L17.62 6c-1.55-1.26-3.5-2-5.62-2a9 9 0 0 0 0 18c5 0 9-4.03 9-9c0-2.12-.74-4.07-1.97-5.61M13 14h-2V7h2zm2-13H9v2h6z"/></svg>`,

  sum: (cls='') => `<svg class="icon ${cls}" viewBox="0 0 24 24"><path fill="currentColor" d="M18 6H8.83l6 6l-6 6H18v2H6v-2l6-6l-6-6V4h12z"/></svg>`,

  grab: `<svg class="icon-pip icon-grab" viewBox="0 0 8 8"><circle cx="4" cy="4" r="3.5" fill="var(--accent)"/></svg>`,

// Damage type by attack name (PF1e Universal Monster Rules)
const DMG_TYPE = {
  bite:'B/P/S', claw:'B/S', gore:'P', horn:'P', slam:'B', sting:'P',
  rake:'B/S', hoof:'B', tail:'B', talon:'S', wing:'B', pincers:'B',
  tentacle:'B', dagger:'P/S', sword:'S', mace:'B',
};
function getDmgType(name) {
  const n = name.toLowerCase().replace(/\s*\d+$/,'');
  return DMG_TYPE[n] || 'B/P/S';
}

// ═══════════════════════════════════════════════════════════════
//  DICE (Crypto)
// ═══════════════════════════════════════════════════════════════
const rng = () => { const a = new Uint32Array(1); crypto.getRandomValues(a); return a[0]; };
const dd = s => (rng() % s) + 1;
const d20 = () => dd(20);
function rdice(n) {
  const m = n.match(/^(\d+)d(\d+)([+-]\d+)?$/);
  if (!m) return {t:0,r:[],m:0};
  const [nc,sc,mc] = [+m[1],+m[2],+(m[3]||0)];
  const rolls = Array.from({length:nc},()=>dd(sc));
  return {t:Math.max(1,rolls.reduce((a,b)=>a+b,0)+mc), r:rolls, m:mc};
}

//  BUFFS
// ═══════════════════════════════════════════════════════════════
const BD = {
  prayer:{a:1,d:1,s:1,ty:'morale'},bless:{a:1,d:0,s:0,ty:'morale'},
  destruction:{a:0,d:4,s:0,ty:'sacred'},justice:{a:3,d:0,s:0,ty:'sacred'},
  smiting:{a:0,d:0,s:0,ty:'sp'},haste:{a:1,d:0,s:0,ty:'haste',extra:1},
  heroism:{a:2,d:0,s:2,ty:'morale'},
  fh4:{a:0,d:0,s:0,ty:'sp',fh:4},
};
function bTotal(overrides) {
  const by = {};
  for (const [id,on] of Object.entries(S.buffs)) {
    if (!on) continue;
    if (overrides && overrides[id] === false) continue;
    const def = BD[id]; if (!def) continue;
    const t = def.ty;
    if (t==='u'||t==='sp'||t==='haste') {
      by[id] = by[id]||{a:0,d:0,s:0,extra:0,fh:0};
      by[id].a+=def.a; by[id].d+=def.d; by[id].s+=def.s;
      if(def.extra) by[id].extra=1; if(def.fh) by[id].fh=def.fh;
    } else {
      by[t]=by[t]||{a:0,d:0,s:0,extra:0,fh:0};
      by[t].a=Math.max(by[t].a,def.a); by[t].d=Math.max(by[t].d,def.d);
      by[t].s=Math.max(by[t].s,def.s);
      if(def.extra) by[t].extra=1; if(def.fh) by[t].fh=Math.max(by[t].fh,def.fh);
    }
  }
  // Second pass: local-only buffs (override=true, global off)
  if (overrides) {
    for (const [id, val] of Object.entries(overrides)) {
      if (val !== true || S.buffs[id]) continue;
      const def = BD[id]; if (!def) continue;
      const t = def.ty;
      if (t==='u'||t==='sp'||t==='haste') {
        by[id]=by[id]||{a:0,d:0,s:0,extra:0,fh:0};
        by[id].a+=def.a;by[id].d+=def.d;by[id].s+=def.s;
        if(def.extra)by[id].extra=1;if(def.fh)by[id].fh=def.fh;
      } else {
        by[t]=by[t]||{a:0,d:0,s:0,extra:0,fh:0};
        by[t].a=Math.max(by[t].a,def.a);by[t].d=Math.max(by[t].d,def.d);
        by[t].s=Math.max(by[t].s,def.s);
        if(def.extra)by[t].extra=1;if(def.fh)by[t].fh=Math.max(by[t].fh,def.fh);
      }
    }
  }
  const r={a:0,d:0,s:0,extra:0,fh:0};
  for(const v of Object.values(by)){r.a+=v.a;r.d+=v.d;r.s+=v.s;if(v.extra)r.extra=1;r.fh=Math.max(r.fh,v.fh||0);}
  return r;
}

// ═══════════════════════════════════════════════════════════════
//  MELEE PARSER
// ═══════════════════════════════════════════════════════════════
function parseMelee(str) {
  if(!str||str.toLowerCase()==='none') return [];
  const atks=[], segs=[]; let depth=0, cur='';
  for(const ch of str){if(ch==='('){depth++;cur+=ch;}else if(ch===')'){depth--;cur+=ch;}else if(ch===','&&depth===0){segs.push(cur.trim());cur='';}else cur+=ch;}
  if(cur.trim())segs.push(cur.trim());
  for(const seg of segs){
    const pm=seg.match(/\(([^)]+)\)/);let dmg='1d4',sp=[],cr=20,cm=2;
    if(pm){const pc=pm[1];const dm=pc.match(/^(\d+d\d+(?:[+-]\d+)?)/);if(dm)dmg=dm[1];
      const c1=pc.match(/\/(\d+)[–-]20/);if(c1)cr=+c1[1];const c2=pc.match(/[×x](\d+)/);if(c2)cm=+c2[1];
      for(const kw of['grab','trip','poison','constrict','rake','rend','attach','burn','pull','push'])if(pc.toLowerCase().includes(kw))sp.push(kw);
    }
    const bef=pm?seg.slice(0,seg.indexOf('(')).trim():seg.trim();
    const nm=bef.match(/^(?:(\d+)\s+)?([\w\s]+?)\s+([+-]?\d+)\s*$/);
    if(nm){const cnt=nm[1]?+nm[1]:1,name=nm[2].trim().replace(/s$/,''),bonus=+nm[3];
      for(let i=0;i<cnt;i++)atks.push({name:cnt>1?`${name} ${i+1}`:name,bonus,dmg,cr,cm,sp:[...sp]});
    }
  }
  return atks;
}

function tierOpts(slot) {
  const o=[{id:'top',lbl:`1x SNA ${slot}`,sna:slot,expr:'1'}];
  if(slot>=2) o.push({id:'lower',lbl:`1d3 SNA ${slot-1}`,sna:slot-1,expr:'1d3'});
  if(slot>=3) o.push({id:'lowest',lbl:`1d4+1 SNA ${slot-2}`,sna:slot-2,expr:'1d4+1'});
  return o;
}
function rollCount(expr){if(expr==='1')return 1;let t=rdice(expr).t;if(S.feats.superior)t++;return t;}

let creatureList = []; // current dropdown items
let selectedCreature = '';
function updCreatures(){
  const slot=+document.getElementById('inp-slot').value;
  const tierId=document.getElementById('inp-tier').value;
  const opts=tierOpts(slot);
  const tier=opts.find(o=>o.id===tierId)||opts[0];
  const lvRatings = R[tier.sna] || {};
  const sorted=Object.values(B).filter(b=>b.sna_level===tier.sna)
    .sort((a,b)=>{
      const ra=lvRatings[a.data.name]?.tier||'U', rb=lvRatings[b.data.name]?.tier||'U';
      const order={S:0,A:1,B:2,C:3,U:4};
      const tierDiff=(order[ra]??4)-(order[rb]??4);
      if(tierDiff!==0) return tierDiff;
      const aAlt=a.data.is_alternate?1:0, bAlt=b.data.is_alternate?1:0;
      if(aAlt!==bAlt) return aAlt-bAlt;
      return a.data.name.localeCompare(b.data.name);
    });
  creatureList = sorted.map(b=>{
    const c=b.data.combat_card;
    const rating=lvRatings[b.data.name];
    return {name:b.data.name, hp:c.HP, ac:c.AC, tier:rating?.tier||'U', note:rating?.note||'', alt:b.data.is_alternate, src:b.data.source||'core'};
  });
  renderCreatureDropdown('');
  if(creatureList.length && !creatureList.find(c=>c.name===selectedCreature)) {
    selectedCreature=creatureList[0].name;
  }
  updDropDisplay();
}

      <span class="cdrop-stats">${c.hp}${IC.hp('icon-sm')} ${c.ac}${IC.ac('icon-sm')}</span>

// ═══════════════════════════════════════════════════════════════
//  PRE-ROLL — sorted roll table
// ═══════════════════════════════════════════════════════════════
function preRoll(c) {
  // Store RAW dice rolls — bonuses computed at render time so buff toggles don't re-roll
  const rawRows = [];
  const rawGrabs = [];

  for (const atk of c.attacks) {
    const r = d20();
    const dr = rdice(atk.dmg);
    let critConf = 0, critDmgRaw = 0, fumbleConf = 0;
    const threat = r >= atk.cr && r !== 1;

    if (threat) {
      critConf = d20();
      // Crit multiplier: x2 = 1 extra roll, x3 = 2 extra rolls, x4 = 3 extra
      const extraRolls = (atk.cm || 2) - 1;
      critDmgRaw = 0;
      for (let cr = 0; cr < extraRolls; cr++) critDmgRaw += rdice(atk.dmg).t;
    }
    if (r === 1) {
      fumbleConf = d20();
    }

    rawRows.push({
      name: atk.name, r, baseBonus: atk.bonus, baseDmg: dr.t, dmgDice: atk.dmg, dmgRolls: dr.r, dmgMod: dr.m,
      critConf, critDmgRaw, fumbleConf, fumbleBonus: atk.bonus,
      cr: atk.cr, cm: atk.cm, specials: atk.sp,
      nat20: r===20, nat1: r===1, threat, isRake: false,
    });

    if (atk.sp.includes('grab') && c.cmb) {
      rawGrabs.push({ atk: atk.name, d20: d20(), baseCmb: c.cmb + 4 });
    }
  }

  // Maintain grapple roll (always pre-roll if creature has grab)
  let maintainRoll = null;
  let maintainDmgRaw = null;
  let grabAtkName = '', grabAtkDmg = '';
  const grabAtk = c.attacks.find(a => a.sp.includes('grab'));
  if (grabAtk && c.cmb) {
    maintainRoll = { d20: d20(), baseCmb: c.cmb + 9 }; // +4 grab, +5 circumstance
    maintainDmgRaw = rdice(grabAtk.dmg);
    grabAtkName = grabAtk.name;
    grabAtkDmg = grabAtk.dmg;
  }

  // Rake attacks (always pre-roll; computeRoll filters by pounce/grapple state)
  if (c.hasRake && c.rakeAtks.length > 0) {
    for (const atk of c.rakeAtks) {
      const r = d20();
      const dr = rdice(atk.dmg);
      const rThreat = r >= (atk.cr||20) && r !== 1;
      let rCritConf = 0, rCritDmgRaw = 0, rFumbleConf = 0;
      if (rThreat) {
        rCritConf = d20();
        const extraRolls = (atk.cm || 2) - 1;
        for (let cr2 = 0; cr2 < extraRolls; cr2++) rCritDmgRaw += rdice(atk.dmg).t;
      }
      if (r === 1) rFumbleConf = d20();
      rawRows.push({
        name: atk.name, r, baseBonus: atk.bonus, baseDmg: dr.t, dmgDice: atk.dmg, dmgRolls: dr.r, dmgMod: dr.m,
        critConf:rCritConf, critDmgRaw:rCritDmgRaw, fumbleConf:rFumbleConf, fumbleBonus:atk.bonus,
        cr:atk.cr||20, cm:atk.cm||2, specials:atk.sp||[],
        nat20:r===20, nat1:r===1, threat:rThreat, isRake:true,
      });
    }
  }

  // Haste slot (raw roll, uses best attack bonus)
  const hasHaste = bTotal(c.buffOvr).extra; // check now but re-eval at render
  if (c.attacks.length > 0) {
    const best = c.attacks.reduce((a,x)=>a.bonus>x.bonus?a:x);
    const r = d20();
    const dr = rdice(best.dmg);
    rawRows.push({
      name:'Haste', r, baseBonus: best.bonus, baseDmg: dr.t, dmgDice: best.dmg, dmgRolls: dr.r, dmgMod: dr.m,
      critConf:0, critDmgRaw:0, fumbleConf:0, fumbleBonus:best.bonus,
      cr:20, cm:2, specials:[],
      nat20:r===20, nat1:r===1, threat:false, isRake:false, isHaste:true,
    });
  }

  // Constrict damage (always pre-roll if creature has constrict)
  let constrictRaw = null;
  if (c.constrictDmg) {
    constrictRaw = rdice(c.constrictDmg);
  }

  c.rawRoll = { rows: rawRows, grabs: rawGrabs, maintainRoll, maintainDmgRaw, constrictRaw, grabAtkName, grabAtkDmg };
}

// Compute display rows from raw rolls + current buffs (called at render time)
function computeRoll(c) {
  if (!c.rawRoll) return null;
  const b = bTotal(c.buffOvr);
  // Per-creature flanking
  if (c.flanking) b.a += 2;
  const rows = [];
  const autoRows = [];
  const grabs = [];

  // Power Attack calculation
  let paAtk = 0, paDmg = 0;
  if (c.powerAttacking && c.hasPowerAttack) {
    paAtk = -c.paX;
    // Count non-auto attacks to determine single vs multi (2x vs 3x)
    const maintainMode2 = c.grappling && S.round > (c.grappleRound || 0);
    const visibleCount = c.rawRoll.rows.filter(raw => {
      if (raw.isHaste && !b.extra) return false;
      if (maintainMode2 && !raw.isRake) return false;
      if (raw.isRake && !c.pouncing && !maintainMode2) return false;
      return true;
    }).length;
    paDmg = visibleCount <= 1 ? c.paX * 3 : c.paX * 2;
  }

  // Auto-damage rows: constrict (always shown if creature has it)
  if (c.rawRoll.constrictRaw) {
    const cr = c.rawRoll.constrictRaw;
    autoRows.push({
      name: 'Constrict', isConstrict: true,
      dmg: Math.max(1, cr.t + b.d),
      dmgDice: c.constrictDmg, dmgRolls: cr.r, dmgMod: (cr.m || 0) + b.d, buffDmg: b.d,
    });
  }
  // Maintain mode = grappling AND past the round grapple started
  const maintainMode = c.grappling && S.round > (c.grappleRound || 0);

  // Maintain auto-damage: grab attack's damage (only in maintain mode)
  if (c.rawRoll.maintainDmgRaw) {
    const md = c.rawRoll.maintainDmgRaw;
    autoRows.push({
      name: (c.rawRoll.grabAtkName || 'Attack') + ' (auto)',
      isMaintainDmg: true,
      dmg: Math.max(1, md.t + b.d),
      dmgDice: c.rawRoll.grabAtkDmg || '?', dmgRolls: md.r, dmgMod: (md.m || 0) + b.d, buffDmg: b.d,
    });
  }

  for (const raw of c.rawRoll.rows) {
    if (raw.isHaste && !b.extra) continue;
    // Maintain mode: suppress normal attacks + haste (standard action used for maintain)
    if (maintainMode && !raw.isRake) continue;
    // When not pouncing/grappling: suppress rake
    if (raw.isRake && !c.pouncing && !maintainMode) continue;

    const bonus = raw.baseBonus + b.a + paAtk;
    const total = raw.r + bonus;
    const dmgBase = raw.baseDmg + b.d + paDmg;
    let dmgWithCrit = dmgBase;
    let critOk = false, critConfTotal = 0;
    let fumbleConfTotal = 0;

    if (raw.threat) {
      critConfTotal = raw.critConf + bonus;
      critOk = true;
      const extraMults = (raw.cm || 2) - 1;
      dmgWithCrit = dmgBase + raw.critDmgRaw + (b.d * extraMults);
    }
    if (raw.nat1) {
      fumbleConfTotal = raw.fumbleConf + raw.fumbleBonus + b.a;
    }

    const hit_ac = raw.nat20 ? 999 : raw.nat1 ? 0 : total;

    rows.push({
      name: raw.name, r: raw.r, bonus, total, hit_ac,
      dmg: dmgWithCrit, dmgNoCrit: dmgBase,
      nat20: raw.nat20, nat1: raw.nat1, threat: raw.threat, critOk,
      critConf: raw.critConf, critConfTotal,
      fumbleConf: raw.fumbleConf, fumbleConfTotal,
      specials: raw.specials, isRake: raw.isRake,
      dmgDice: raw.dmgDice, dmgRolls: raw.dmgRolls, dmgMod: (raw.dmgMod||0)+b.d+paDmg, buffDmg: b.d, buffAtk: b.a, paAtk, paDmg, baseBonus: raw.baseBonus,
    });
  }

  for (const raw of c.rawRoll.grabs) {
    grabs.push({ atk: raw.atk, d20: raw.d20, total: raw.d20 + raw.baseCmb + b.a });
  }

  rows.sort((a, b) => b.total - a.total);

  // Compute maintain grapple total
  let maintain = null;
  if (c.rawRoll.maintainRoll) {
    const mr = c.rawRoll.maintainRoll;
    maintain = { d20: mr.d20, total: mr.d20 + mr.baseCmb + b.a };
  }

  return { rows, autoRows, grabs, maintain };
}

function reroll() {
  for (const g of S.groups) for (const c of g.creatures) if (c.alive) preRoll(c);
  render();
}

// ═══════════════════════════════════════════════════════════════
//  CREATURE CREATION
// ═══════════════════════════════════════════════════════════════
function mkCreature(bEntry, aug) {
  const data = bEntry.data;
  const card = aug && data.augmented ? data.augmented : data.combat_card;
  const base = data.combat_card;
  const full = data.full_statblock || {};
  const specials = (card.Special_Attacks||base.Special_Attacks||'').toLowerCase();
  const hasPounce = specials.includes('pounce');
  const hasRake = specials.includes('rake');

  // Parse rake attacks from specials string
  // Format: "rake (2 claws +7, 1d6+4)" — count name bonus, damage
  let rakeAtks = [];
  if (hasRake) {
    const rm = specials.match(/rake\s*\(([^)]+)\)/);
    if (rm) {
      const rakeStr = rm[1]; // "2 claws +7, 1d6+4"
      const countM = rakeStr.match(/^(\d+)/);
      const bonusM = rakeStr.match(/([+-]\d+)/);
      const dmgM = rakeStr.match(/(\d+d\d+(?:[+-]\d+)?)/);
      const count = countM ? parseInt(countM[1]) : 2;
      const bonus = bonusM ? parseInt(bonusM[1]) : 0;
      const dmgStr = dmgM ? dmgM[1] : '1d4';
      for (let i = 0; i < count; i++) {
        rakeAtks.push({name:`Rake ${i+1}`, bonus, dmg:dmgStr, cr:20, cm:2, sp:['rake']});
      }
    }
    if (rakeAtks.length === 0) {
      // Fallback: use first claw attack stats
      const allAtks = parseMelee(card.Melee||base.Melee||'');
      const clawAtk = allAtks.find(a=>a.name.toLowerCase().includes('claw'));
      if (clawAtk) {
        rakeAtks = [
          {name:'Rake 1', bonus:clawAtk.bonus, dmg:clawAtk.dmg, cr:20, cm:2, sp:['rake']},
          {name:'Rake 2', bonus:clawAtk.bonus, dmg:clawAtk.dmg, cr:20, cm:2, sp:['rake']},
        ];
      }
    }
  }

  // Parse constrict damage
  let constrictDmg = '';
  if (specials.includes('constrict')) {
    const cm2 = specials.match(/constrict\s*\((\d+d\d+(?:[+-]\d+)?)/);
    if (cm2) constrictDmg = cm2[1];
    if (!constrictDmg) {
      const ca = (data.special_abilities || []).find(a => a.name.toLowerCase().includes('constrict'));
      if (ca) { const dm = ca.desc.match(/(\d+d\d+(?:[+-]\d+)?)/); if (dm) constrictDmg = dm[1]; }
    }
  }

  return {
    id:`C${nCid++}`, name:data.name, hp:card.HP||10, maxHp:card.HP||10,
    ac:card.AC||10, attacks:parseMelee(card.Melee||base.Melee||''), aug,
    cmb:card.CMB||base.CMB||0, cmd:card.CMD||base.CMD||10,
    fort:card.Fort||base.Fort||0, ref:card.Ref||base.Ref||0, will:card.Will||base.Will||0,
    speed:card.Speed||base.Speed||'30 ft.',
    specials, hasPounce, hasRake, rakeAtks, constrictDmg,
    hasGrab: parseMelee(card.Melee||base.Melee||'').some(a=>a.sp.includes('grab')),

    snaLevel: bEntry.sna_level,

    flanking:false,

    paX: (full.Feats||'').toLowerCase().includes('power attack') ? 1+Math.floor((full.BAB||0)/4) : 0,

      (full.Feats||'').toLowerCase().includes('lunge') ? 'Lunge' : '',

    ].filter(Boolean),

}

function doSummon() {
  const slot=+document.getElementById('inp-slot').value;
  const cl=+document.getElementById('inp-cl').value||10;
  const tierId=document.getElementById('inp-tier').value;
  const opts=tierOpts(slot);
  const tier=opts.find(o=>o.id===tierId)||opts[0];
  const name=selectedCreature;
  if(!name) return;
  const bE=B[name.toLowerCase()]; if(!bE) return;
  const count=rollCount(tier.expr);
  const aug=!!S.feats.augment;
  const g={id:`G${nGid++}`,name:`SNA ${slot}: ${count}x ${name}`,src:'sna',
    creatures:[],rl:cl,casting:true,slot};
  for(let i=0;i<count;i++) g.creatures.push(mkCreature(bE,aug));
  S.groups.push(g);
  if(S.round===0) S.round=1;
  for(const c of g.creatures) preRoll(c);
  closeAllTrays();
  render();
}

function closeAllTrays() {
  document.querySelectorAll('.tray-panel').forEach(p=>p.classList.remove('open'));
  document.querySelectorAll('.tray-tab').forEach(t=>t.classList.remove('active'));
}

function summonLions(){
  const bE=B['lion']; if(!bE){alert('Lion not in bestiary');return;}
  const g={id:`G${nGid++}`,name:'Lion Figurines',src:'figurine',creatures:[],rl:600,casting:false}; // 1hr/day, 1wk cooldown if killed
  for(let i=0;i<2;i++){const c=mkCreature(bE,false);c.name='Lion';g.creatures.push(c);}
  S.groups.push(g);
  if(S.round===0) S.round=1;
  for(const c of g.creatures) preRoll(c);
  closeAllTrays();
  render();
}

function castMod() { return +(document.getElementById('inp-cmod')?.value) || 0; }
const SE = {

    name: 'Flaming Sphere', dmg: '3d6', dmgType: 'fire', spLv: 2,
    save: 'Ref half', note: 'Move action to reposition 30 ft.',
    dc: () => 10 + 2 + castMod(), dur: cl => cl,
  },
  sphere_wand: {
    name: 'Flaming Sphere (wand)', dmg: '3d6', dmgType: 'fire', spLv: 2,
    save: 'Ref half', note: 'CL 3 wand. Move action to reposition 30 ft.',
    dc: () => 13, dur: () => 3,
  },
  ball_lightning: {
    name: 'Ball Lightning', dmg: '3d6', dmgType: 'electricity', spLv: 4,
    save: 'Ref neg', note: 'Move action directs ALL globes 20 ft. −4 save in metal armor.',
    dc: () => 10 + 4 + castMod(), dur: cl => cl,
    count: cl => Math.max(2, Math.min(5, 2 + Math.floor(Math.max(0, cl - 7) / 4))),
  },

function addSpell(type) {
  const def = SE[type]; if (!def) return;
  const cl = +document.getElementById('inp-cl').value || 10;
  const dc = def.dc(cl);
  const dur = def.dur(cl);
  const count = def.count ? def.count(cl) : 1;
  const groupId = count > 1 ? `SG${nGid++}` : null;

  for (let i = 0; i < count; i++) {
    const e = {
      id: `E${nGid++}`, type, name: def.name,
      rl: dur, dc, dmg: def.dmg, dmgType: def.dmgType,
      save: def.save, note: def.note, src: type.includes('wand') ? 'wand' : 'cast',
      groupId, globeIdx: count > 1 ? i + 1 : 0,
      rollResult: rdice(def.dmg),
    };
    S.effects.push(e);
  }
  if (S.round === 0) S.round = 1;
  closeAllTrays();
  render();
}

function rollSpell(eid) {
  const e = S.effects.find(x => x.id === eid); if (!e) return;
  const def = SE[e.type];
  e.rollResult = rdice(e.dmg);
  render();
}



function dismissSpell(eid) {
  S.effects = S.effects.filter(x => x.id !== eid);
  render();
}

function renderSpellCard(e, spColorIdx) {
  const r = e.rollResult || { t: 0, r: [], m: 0 };
  const breakdown = r.r.length ? `[${r.r.join('+')}]` : '';
  const globePill = e.globeIdx ? `<span class="gpill gpill-sp-${(spColorIdx||0) % 4}">Globe ${e.globeIdx}</span>` : '';

  return `<div class="scard">

//  ROUND
// ═══════════════════════════════════════════════════════════════
function nextRound(){
  S.round++;
  for(const g of S.groups){if(g.casting){g.casting=false;}else{g.rl--;}}
  S.groups=S.groups.filter(g=>{if(g.rl<=0&&g.src==='sna'){g.creatures.forEach(c=>{c.alive=false;});return false;}return true;});
  S.effects=S.effects.filter(e=>{e.rl--;return e.rl>0;});
  // Re-roll spell effect damage for new round
  for(const e of S.effects) if(e.rollResult) e.rollResult=rdice(e.dmg);
  // Fast healing
  const fh=bTotal({}).fh;
  if(fh>0) for(const g of S.groups) for(const c of g.creatures) if(c.alive&&c.hp<c.maxHp) c.hp=Math.min(c.maxHp,c.hp+fh);
  reroll();
}

// ═══════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════
function render(){
  document.getElementById('disp-rd').textContent=S.round;
  saveState();
  document.querySelectorAll('.chip[data-feat]').forEach(el=>el.classList.toggle('on',!!S.feats[el.dataset.feat]));
  document.querySelectorAll('.chip[data-buff]').forEach(el=>el.classList.toggle('on',!!S.buffs[el.dataset.buff]));
  updTiers();

  const refACval = document.getElementById('ref-ac').value;
  const refAC = refACval === '' ? 0 : parseInt(refACval) || 0;
  const area=document.getElementById('creatures-out');
  // Cards fill viewport — flat grid, pills for group identity
  let h='<div class="creatures-flow">';
  for(let gi=0; gi<S.groups.length; gi++){
    const g = S.groups[gi];
    for(const c of g.creatures) h+=renderCard(c, g, refAC, gi);
  }
  // Assign a color index per spell groupId
  const spGroupColors = {};
  let spColorIdx = 0;
  for(const e of S.effects) {
    if(e.groupId && !(e.groupId in spGroupColors)) spGroupColors[e.groupId] = spColorIdx++;
  }
  for(const e of S.effects) h+=renderSpellCard(e, e.groupId ? spGroupColors[e.groupId] : -1);
  h+='</div>';
  area.innerHTML=h;

  // Auto-open summon tray when board is empty and no tray is open
  if(S.groups.length === 0 && S.effects.length === 0 && !document.querySelector('.tray-panel.open')) {
    toggleTray('summon');
  }

  // Dismissed tray content + tab indicator
  const dismissedEl = document.getElementById('dismissed-content');
  const dismissedTab = document.getElementById('tab-dismissed');
  if (dismissed.length > 0) {
    dismissedEl.innerHTML = `<div class="chip-row">${dismissed.map((t,i) =>
      `<button class="sm" onclick="restoreFromDismissed(${i})">${t.creature.name} ↩</button>`
    ).join('')}</div>`;
    dismissedTab.classList.add('has-items');
    dismissedTab.textContent = `Dismissed (${dismissed.length})`;
  } else {
    dismissedEl.innerHTML = '';
    dismissedTab.classList.remove('has-items');
    dismissedTab.textContent = 'Dismissed';
  }
}

function renderDecisions(c) {
  const flankHTML = `<span class="flank-tag ${c.flanking?'active':''}" onclick="event.stopPropagation();togFlanking('${c.id}')" title="Flanking: +2 attack (untyped)">${c.flanking?'FLANKING':'Flank'}</span>`;
  const pounceHTML = c.hasPounce ?
    `<span class="pounce-tag ${c.pouncing?'active':''}" onclick="event.stopPropagation();togPounce('${c.id}')" title="Charge+pounce: rake without grapple">${c.pouncing?'POUNCING':'Pounce'}</span>` : '';
  const grapHTML = `<span class="grapple-tag ${c.grappling?'active':''}" onclick="event.stopPropagation();togGrapple('${c.id}')" title="Grappling: maintain + constrict/rake (if available)">${c.grappling?'GRAPPLING':'Grapple'}</span>`;
  const paHTML = c.hasPowerAttack ?
    `<span class="pa-tag ${c.powerAttacking?'active':''}" onclick="event.stopPropagation();togPA('${c.id}')" title="Power Attack: -${c.paX} atk, +${c.paX*2} dmg (${c.paX*3} single)">${c.powerAttacking?'PWR ATK':'Pwr Atk'}</span>` : '';
  // Notable feats computed at render time (survives localStorage without migration)
  const featsStr = (c.feats||'').toLowerCase();
  const notableFeats = [
    featsStr.includes('combat expertise') ? 'CE' : '',
    featsStr.includes('lunge') ? 'Lunge' : '',
    /\bcleave\b/.test(featsStr) ? (featsStr.includes('great cleave')?'Gt Cleave':'Cleave') : '',
  ].filter(Boolean);
  const featBadges = notableFeats.map(f => `<span class="feat-badge">${f}</span>`).join('');

  // Tactical badges — non-interactive, with tooltips
  const tacBadges = [];
  if (featsStr.includes('flyby attack')) tacBadges.push({name:'Flyby', tip:'Move → attack → continue moving. No AoO from target.'});
  if (featsStr.includes('spring attack')) tacBadges.push({name:'Spring Atk', tip:'Move → melee attack during move → continue moving.'});
  if (featsStr.includes('combat reflexes')) {
    const aoos = Math.max(1, mod(c.dex));
    tacBadges.push({name:`CR ${aoos}`, tip:`Combat Reflexes: ${aoos} AoOs/round (Dex mod).`});
  }
  if (featsStr.includes('diehard')) tacBadges.push({name:'Diehard', tip:`Fights until -${c.con} HP. Auto-stabilizes.`});
  const tacHTML = tacBadges.map(b => `<span class="tac-badge" title="${b.tip}">${b.name}</span>`).join('');

  const allBadges = featBadges + tacHTML;
  const badgeRow = allBadges ? `<div class="feat-badge-row">${allBadges}</div>` : '';
  return `<div class="decisions-row">${flankHTML} ${pounceHTML} ${paHTML} <span class="decisions-right">${grapHTML}</span></div>${badgeRow}`;
}

function renderRollTable(c, pr, refAC) {
  const hasAC = refAC > 0;
  let hitDmg=0, hitCount=0, totalAtks=pr.rows.length;
  let acLineDrawn = false;
  const triggeredSpecials = new Set();
  let runningDmg = 0, runningDmgCrit = 0;
  const runningByType = {};
  let tableHTML=`<table class="roll-table"><tr><th>Attack</th><th class="r">${IC.atk('icon-sm')}</th><th class="r">${IC.dmg('icon-sm')}</th><th class="r th-sum" title="Running damage total">Σ</th></tr>`;

  // Auto-damage rows at top (constrict, maintain auto-dmg)
  const maintainMode = c.grappling && S.round > (c.grappleRound || 0);
  for (const ar of pr.autoRows) {
    if (ar.isMaintainDmg && !maintainMode) continue;
    const active = c.grappling;
    const cls = active ? 'auto-active' : 'auto-muted';
    if (active) {
      runningDmg += ar.dmg; runningDmgCrit += ar.dmg;
      if (hasAC) { hitDmg += ar.dmg; }
    }
    const runCell = active ? runningDmg : '—';
    const baseMod = ar.dmgMod - (ar.buffDmg||0);
    const buffPart = ar.buffDmg ? ` +${ar.buffDmg} buff` : '';
    const rollStr = ar.dmgRolls ? `[${ar.dmgRolls.join('+')}]${baseMod>=0?'+':''}${baseMod}${buffPart}` : '';
    const dmgTip = `${ar.dmgDice}: ${rollStr}`;
    tableHTML += `<tr class="${cls}"><td><span class="atk-pips"></span><span class="atk-name">${ar.name.toLowerCase()}</span></td><td class="total">—</td><td class="dmg" title="${dmgTip}">${ar.dmg}</td><td class="running">${runCell}</td></tr>`;
  }

  for(const r of pr.rows){
    const isHit = hasAC ? r.hit_ac >= refAC : null;
    const critConfirmed = r.critOk && hasAC && r.critConfTotal >= refAC;
    const critPending = r.critOk && !hasAC;
    const fumbleFail = r.nat1 && hasAC && r.fumbleConfTotal < refAC;
    const fumbleSafe = r.nat1 && hasAC && r.fumbleConfTotal >= refAC;
    const fumblePending = r.nat1 && !hasAC;
    const effectiveDmg = critConfirmed ? r.dmg : r.dmgNoCrit;
    if(isHit) { hitDmg += effectiveDmg; hitCount++; }
    const countForRunning = isHit === true || isHit === null;
    if(countForRunning && !r.nat1) {
      const thisDmg = hasAC ? effectiveDmg : r.dmgNoCrit;
      runningDmg += thisDmg;
      runningDmgCrit += hasAC ? effectiveDmg : r.dmg;
      const dt = getDmgType(r.name);
      runningByType[dt] = (runningByType[dt]||0) + thisDmg;
    }
    let acLine='';
    if(hasAC && !acLineDrawn && isHit===false){ acLineDrawn=true; acLine=' ac-line'; }

    let cls = '';
    if(fumbleFail) cls = '';
    else if(critConfirmed) cls = 'crit';
    else if(isHit===true) cls = 'hit';
    else if(isHit===false) cls = 'miss';

    let dmgCell;
    if (hasAC) {
      if (!isHit) dmgCell = '-';
      else if (critConfirmed) dmgCell = `<span class="shimmer-red">${effectiveDmg}</span>`;
      else dmgCell = `${effectiveDmg}`;
    } else {
      if (r.critOk) dmgCell = `${r.dmgNoCrit}/<span class="shimmer-red">${r.dmg}</span>`;
      else dmgCell = `${r.dmgNoCrit}`;
    }
    let runCell;
    if (isHit===false || r.nat1) { runCell = ''; }
    else if (runningDmg !== runningDmgCrit) { runCell = `${runningDmg}/${runningDmgCrit}`; }
    else { runCell = runningDmg; }

    const spPips = r.specials.filter(s=>s!=='rake').map(s => IC[s] || '').join('');
    const pipCell = spPips ? `<span class="atk-pips">${spPips}</span>` : `<span class="atk-pips"></span>`;
    const nameCls = r.isRake ? 'atk-name atk-rake' : 'atk-name';
    const nameCell = `${pipCell}<span class="${nameCls}">${r.name.toLowerCase()}</span>`;

    if ((isHit || !hasAC) && r.specials.length) {
      for (const s of r.specials.filter(x=>x!=='rake')) {
        triggeredSpecials.add(s);
      }
    }

    const paAtkStr = r.paAtk ? ` ${r.paAtk} PA` : '';
    const buffAtkStr = (r.buffAtk||r.paAtk) ? ` (${r.baseBonus>=0?'+':''}${r.baseBonus} base${r.buffAtk?` ${r.buffAtk>=0?'+':''}${r.buffAtk} buffs`:''}${paAtkStr})` : '';
    const atkTip = `d20: ${r.r} ${r.bonus>=0?'+':''}${r.bonus}${buffAtkStr} = ${r.total}${r.critOk?' | conf: '+r.critConf+' '+((r.bonus>=0?'+':'')+r.bonus)+' = '+r.critConfTotal:''}${r.nat1?' | reroll: '+r.fumbleConf+' '+((r.bonus>=0?'+':'')+r.bonus)+' = '+r.fumbleConfTotal:''}`;
    let atkCell = `${r.total}`;
    if (critPending) atkCell = `<span class="tag-threat">CRIT/${r.critConfTotal}</span>`;
    else if (critConfirmed) atkCell = `<span class="shimmer-red">CONF</span>`;
    else if (r.critOk && hasAC) atkCell = `<span class="tag-crit">CRIT</span>`;
    else if (fumblePending) atkCell = `<span class="tag-nat1">FAIL/${r.fumbleConfTotal}</span>`;
    else if (fumbleFail) atkCell = `<b class="tag-fumble">FUMBLE</b>`;
    else if (fumbleSafe) atkCell = `<span class="tag-muted">FAIL</span>`;
    const dmgType = getDmgType(r.name);
    const typeNames = dmgType.split('/').map(t=>({B:'bludg.',S:'slash.',P:'pierc.'})[t]||t).join(', ');
    const baseMod = r.dmgMod - (r.buffDmg||0) - (r.paDmg||0);
    const buffPart = r.buffDmg ? ` +${r.buffDmg} buff` : '';
    const paPart = r.paDmg ? ` +${r.paDmg} PA` : '';
    const rollStr = r.dmgRolls ? `[${r.dmgRolls.join('+')}]${baseMod>=0?'+':''}${baseMod}${buffPart}${paPart}` : '';
    const dmgTip = `${r.dmgDice||'?'}: ${rollStr} (${typeNames})`;
    const runTip = (runCell && !r.nat1 && !(isHit===false)) ? Object.entries(runningByType).map(([t,v])=>`${v} (${t})`).join(', ') : '';
    tableHTML+=`<tr class="${cls}${acLine}"><td>${nameCell}</td><td class="total" title="${atkTip}">${atkCell}</td><td class="dmg" title="${dmgTip}">${dmgCell}</td><td class="running" title="${runTip}">${runCell}</td></tr>`;
  }
  tableHTML+=`</table>`;

  // Specials legend
  const specialsHTML = renderSpecialsLegend(c, pr, refAC, triggeredSpecials, maintainMode);

  // Summary
  const nCrits = pr.rows.filter(r=>r.critOk && (!hasAC || r.critConfTotal >= refAC)).length;
  const nFumbles = pr.rows.filter(r=>r.nat1 && hasAC && r.fumbleConfTotal < refAC).length;
  const critNote = nCrits ? ` | <span class="tag-crit">${nCrits} CRIT${nCrits>1?'S':''}</span>` : '';
  const fumbleNote = nFumbles ? ` | <span class="tag-fumble">${nFumbles} FUMBLE${nFumbles>1?'S':''}</span>` : '';
  const dmgDisplay = runningDmg !== runningDmgCrit ? `${runningDmg}/<span class="tag-crit">${runningDmgCrit}</span>` : `${runningDmg}`;
  const summaryTip = Object.entries(runningByType).map(([t,v])=>`${v} (${t})`).join(', ');
  let summaryHTML;
  if(hasAC) {
    summaryHTML=`<div class="roll-summary"><table class="roll-summary-table"><tr>
      <td class="summary-label"><b class="tag-hit">${hitCount}</b>/${totalAtks} hit${critNote}${fumbleNote}</td>
      <td class="total-dmg" title="${summaryTip}">${hitDmg}</td>
    </tr></table></div>`;
  } else {
    summaryHTML=`<div class="roll-summary"><table class="roll-summary-table"><tr>
      <td class="summary-label">${totalAtks} attacks${critNote}${fumbleNote}</td>
      <td class="total-dmg" title="${summaryTip}">${dmgDisplay}</td>
    </tr></table></div>`;
  }

  return { tableHTML, specialsHTML, summaryHTML };
}

function renderSpecialsLegend(c, pr, refAC, triggeredSpecials, maintainMode) {
  const hasAC = refAC > 0;
  const allSpecials = new Set();
  c.attacks.forEach(a => a.sp.forEach(s => { if(s!=='rake') allSpecials.add(s); }));
  allSpecials.delete('constrict');
  if (allSpecials.size === 0) return '';

  let html = `<div class="specials-section">`;
  for (const s of allSpecials) {
    const isTriggered = triggeredSpecials.has(s);
    const pip = IC[s] || '';
    const mark = (isTriggered && hasAC) ? ' ✓' : '';
    const sName = s.charAt(0).toUpperCase()+s.slice(1);
    const url = PFSRD[s] || '#';
    let info = '';
    if (s === 'grab') {
      if (maintainMode) {
        info = pr.maintain ? ` <span class="shimmer-blue">maintain ${pr.maintain.total} vs CMD</span>` : '';
      } else {
        let grabs = pr.grabs;
        if (hasAC) {
          const hitNames = new Set(pr.rows.filter(r => r.hit_ac >= refAC).map(r => r.name));
          grabs = grabs.filter(g => hitNames.has(g.atk));
        }
        const rolls = grabs.map(g=>g.total).join(', ');
        info = rolls ? ` ${rolls} vs CMD` : '';
      }
    } else {
      const detail = c.specialAbilities?.find(a => a.name.toLowerCase().includes(s));
      if (detail?.desc) {
        const dcMatch = detail.desc.match(/DC\s*(\d+)/);
        const saveMatch = detail.desc.match(/(Fort|Ref|Will)/);
        const effectMatch = detail.desc.match(/effect\s+(.+?)(?:;|$)/);
        const parts = [];
        if (saveMatch) parts.push(saveMatch[1]);
        if (dcMatch) parts.push(`DC ${dcMatch[1]}`);
        if (effectMatch) parts.push(effectMatch[1].trim().replace(/\s*damage\s*/gi,'').slice(0,20));
        if (parts.length) info = ` ${parts.join(' ')}`;
      }
    }
    const infoCls = (isTriggered && hasAC) ? 'legend-active' : '';
    html += `<div class="special-legend legend-${s}">${pip} <a class="sp-link" href="${url}" target="_blank" onclick="event.stopPropagation()">${sName}</a>${mark} <span class="${infoCls}">${info}</span></div>`;
  }
  // Crit rider feats — show conditionally when a crit confirms
  const featsLow = (c.feats||'').toLowerCase();
  const hasConfirmedCrit = pr.rows.some(r => r.critOk && (!hasAC || r.critConfTotal >= refAC));
  if (hasConfirmedCrit) {
    if (featsLow.includes('bleeding critical')) {
      const cls = hasAC ? 'legend-active' : '';
      html += `<div class="special-legend"><span class="${cls}">Bleeding Critical: 2d6 bleed/round (stacks)</span></div>`;
    }
    if (featsLow.includes('staggering critical')) {
      const bab = c.bab || 0;
      const dc = 10 + bab;
      const cls = hasAC ? 'legend-active' : '';
      html += `<div class="special-legend"><span class="${cls}">Staggering Critical: Fort DC ${dc} or staggered 1d4+1 rounds</span></div>`;
    }
  }

  return html + `</div>`;
}

function renderAbilities(c) {
  const meleeSpecials = new Set(['grab','trip','poison','constrict','rake','rend','attach','burn','pull','push','pounce']);
  const keyAbilities = (c.specialAbilities || []).filter(a => {
    const kw = a.name.split(/[\s(]/)[0].toLowerCase();
    return !meleeSpecials.has(kw);
  });
  const saText = c.specialAtks || '';
  const saTextParsed = [...saText.matchAll(/(\w[\w\s]*?)\s*\(([^)]+)\)/g)];
  for (const m of saTextParsed) {
    const name = m[1].trim().toLowerCase();
    if (meleeSpecials.has(name)) continue;
    if (keyAbilities.find(a => a.name.toLowerCase().includes(name))) continue;
    const pfsrdName = name.replace(/\s+/g, '-');
    const url = PFSRD[name] || `https://www.d20pfsrd.com/bestiary/rules-for-monsters/universal-monster-rules/#${pfsrdName}`;
    keyAbilities.push({ name: m[1].trim(), desc: m[2], _fromText: true, _url: url });
  }
  // CMB feat maneuvers — parse from Feats string
  const cmbFeats = [];
  const fs = (c.feats||'');
  const fsLow = fs.toLowerCase();
  const cmbVal = c.cmb || 0;
  if (fsLow.includes('improved bull rush')) {
    const hasGreater = fsLow.includes('greater bull rush');
    const desc = hasGreater ? `CMB ${fmtMod(cmbVal+2)}, pushed foe provokes AoOs` : `CMB ${fmtMod(cmbVal+2)} (no AoO)`;
    cmbFeats.push({name: hasGreater ? 'Gr. Bull Rush' : 'Imp. Bull Rush', desc, url: PFSRD['bull rush']});
  }
  if (fsLow.includes('improved overrun')) {
    const hasGreater = fsLow.includes('greater overrun');
    const desc = hasGreater ? `CMB ${fmtMod(cmbVal+2)}, overrun foe provokes AoOs` : `CMB ${fmtMod(cmbVal+2)} (no AoO)`;
    cmbFeats.push({name: hasGreater ? 'Gr. Overrun' : 'Imp. Overrun', desc, url: PFSRD['overrun']});
  }
  if (fsLow.includes('improved sunder')) {
    cmbFeats.push({name: 'Imp. Sunder', desc: `CMB ${fmtMod(cmbVal+2)} (no AoO)`, url: PFSRD['sunder']});
  }
  if (fsLow.includes('awesome blow')) {
    cmbFeats.push({name: 'Awesome Blow', desc: `CMB ${fmtMod(cmbVal)} → 10ft knockback + prone`, url: PFSRD['awesome blow']});
  }
  for (const cf of cmbFeats) {
    keyAbilities.push({name: cf.name, desc: cf.desc, _fromText: true, _url: cf.url});
  }

  if (keyAbilities.length === 0) return '';
  let html = '<div class="ability-section">';
  for (const a of keyAbilities) {
    const dcMatch = a.desc.match(/DC\s*(\d+)/);
    const dcStr = dcMatch ? `DC ${dcMatch[1]}` : '';
    const rangeMatch = a.desc.match(/(\d+)[- ](?:foot|ft)/);
    const rangeStr = rangeMatch ? `${rangeMatch[1]}ft` : '';
    const saveMatch = a.desc.match(/(Will|Fort|Ref)\s*(?:save)?/i);
    const saveStr = saveMatch ? saveMatch[1] : '';
    const typeMatch = a.name.match(/\((Su|Ex|Sp)\)/);
    const typeStr = typeMatch ? typeMatch[1] : '';
    const info = [dcStr, saveStr, rangeStr].filter(Boolean).join(' ');
    const nameDisp = a._url ? `<a class="ability-name sp-link" href="${a._url}" target="_blank" onclick="event.stopPropagation()">${a.name.split('(')[0].trim()}</a>` : `<span class="ability-name">${a.name.split('(')[0].trim()}</span>`;
    html += `<div class="ability-row">
      <span>${nameDisp} <span class="ability-type">${typeStr}</span></span>
      <span class="ability-dc">${info}</span>
    </div>`;
  }
  return html + '</div>';
}

      <div><div class="ab-label">CON</div><div class="ab-val">${c.con}</div></div>

      <div><div class="ab-label">WIS</div><div class="ab-val">${c.wis}</div></div>

function renderCard(c, group, refAC, groupIdx) {
  if (!c.alive) return renderDeadCard(c);

  const hpPct=c.maxHp>0?(c.hp/c.maxHp*100):0;
  const hpCls=hpPct>50?'':hpPct>25?'low':'crit';
  const cardCls=group.casting?'casting':'';
  const durBadge=group.src==='figurine'?'1hr':`${group.rl}${IC.countdown('icon-sm')}`;

  // Group pill
  const multi = group.creatures.length > 1;
  const gpillLabel = group.src === 'figurine' ? 'Figurine' : group.src === 'sna' ? `SNA ${group.slot||''}` : '';
  const gpillHTML = multi && gpillLabel ? `<span class="gpill gpill-${(groupIdx||0) % 5}">${gpillLabel}</span>` : '';

  // Roll table + specials + summary
  let summaryHTML='', tableHTML='', specialsHTML='';
  const pr = c.rawRoll ? computeRoll(c) : null;
  if (pr) {
    const result = renderRollTable(c, pr, refAC);
    tableHTML = result.tableHTML;
    specialsHTML = result.specialsHTML;
    summaryHTML = result.summaryHTML;
  }

  const hpTap = `<span class="hp-tap" onclick="openNumpad('hp','${c.id}',this)" title="Tap to adjust HP">${IC.hp()}${c.hp}/${c.maxHp}</span>`;

  return `<div class="ccard ${cardCls}" onclick="this.classList.toggle('show-stats')">
    ${gpillHTML}
    <span class="ccard-id">${c.id} <span class="ccard-dismiss" onclick="event.stopPropagation();dismissCreature('${c.id}','${group.id}')" title="Dismiss">×</span></span>
    <div class="ccard-namerow">
      <span class="ccard-name">${c.name}</span>
      <span class="ccard-dur">${durBadge}</span>
    </div>
    <div class="ccard-head">
      ${hpTap}<span class="ccard-ac">${c.ac}${IC.ac()}</span>
    </div>
    <div class="hpbar" onclick="event.stopPropagation();openNumpad('hp','${c.id}',this)"><div class="hpfill ${hpCls}" style="--hp-cur:${c.hp}; --hp-max:${c.maxHp}"></div></div>
    <div class="hp-row">
      <span class="ccard-cmd">CMD ${c.cmd}</span>
    </div>
    ${renderAbilities(c)}
    ${renderDecisions(c)}
    ${summaryHTML}${tableHTML}${specialsHTML}
    ${renderBuffChips(c)}
    <div class="ccard-meta"><span>Spd ${c.speed}</span><span>Reach ${c.reach}</span><span class="meta-right">${c.size}</span></div>
    ${renderStatBlock(c)}
  </div>`;
}
